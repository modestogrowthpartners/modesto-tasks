    <span class="tp" style="background:${hexA(t.hex,.14)};color:${t.hex}">${esc(t.label.replace(/s$/,''))}</span>
    <div class="ti">${esc(d.titulo||'(sem título)')}</div>
    <div class="mt">${esc(docDate(d.created_at))}<span class="open">Abrir →</span></div>
  </button>`;
}
function renderDocsView(){
  const el = $('v-docs');
  if(!DOCS_LOADED){
    el.innerHTML = `<div class="mg-load">Carregando documentos…</div>`;
    loadDocs().then(renderDocsView);
    return;
  }
  const topo = `<div style="display:flex;align-items:center;margin-bottom:16px">
      <div class="mg-crumb" style="margin:0">${
        DVIEW.kind==='home'
          ? `<b style="color:var(--text)">Visão geral</b>`
          : `<a onclick="dGo({kind:'home'})">Documentos</a><span>›</span><b style="color:var(--text)">${
              DVIEW.kind==='client' ? esc(clientName(DVIEW.id)) : esc(docTipo(DVIEW.id).label)}</b>`
      }</div>
      <div style="flex:1"></div>
      ${isAdmin()?`<button class="btn-p" onclick="uploadDoc()">+ Enviar documento</button>`:''}
    </div>`;

  if(DOCS_LOADED==='erro'){
    el.innerHTML = topo + `<div class="mg-empty">Não foi possível ler a tabela <b>documents</b>.<br><span style="font-size:12px">${esc(window._docsErr||'')}</span></div>`;
    return;
  }
  if(!DOCS.length){
    el.innerHTML = topo + `<div class="mg-empty">Nenhum documento publicado ainda.${isAdmin()?' Use “Enviar documento” para publicar o primeiro.':''}</div>`;
    return;
  }

  if(DVIEW.kind==='home'){
    const tipos = DOC_TIPOS.filter(t=>DOCS.some(d=>d.tipo===t.k));
    DOCS.forEach(d=>{ if(d.tipo && !tipos.some(t=>t.k===d.tipo)) tipos.push(docTipo(d.tipo)); });
    el.innerHTML = topo
      + `<div class="dcat-row">` + tipos.map(t=>{
          const n = DOCS.filter(d=>d.tipo===t.k).length;
          return `<button class="dcat" onclick="dGo({kind:'cat',id:'${esc(t.k)}'})">
            <span class="ic" style="background:${hexA(t.hex,.14)};color:${t.hex}">${t.ic}</span>
            <div class="nm">${esc(t.label)}</div><div class="c">${n} documento${n===1?'':'s'}</div></button>`;
        }).join('') + `</div>`
      + `<div class="mg-sec"><span class="t">Pastas por cliente</span></div><div class="dfolders">`
      + CLIENTS.map(c=>{
          const ds = DOCS.filter(d=>d.client_id===c.id);
          if(!ds.length && !isAdmin()) return '';
          return `<button class="dfolder" onclick="dGo({kind:'client',id:'${esc(c.id)}'})">
            <div class="cl">${clientChipHTML(c.id)}</div>
            <div class="mt">${ds.length} documento${ds.length===1?'':'s'}<span class="open">Abrir pasta →</span></div>
          </button>`;
        }).join('') + `</div>`;
  }
  else if(DVIEW.kind==='client'){
    const ds = DOCS.filter(d=>d.client_id===DVIEW.id);
    const tipos = DOC_TIPOS.filter(t=>ds.some(d=>d.tipo===t.k));
    ds.forEach(d=>{ if(d.tipo && !tipos.some(t=>t.k===d.tipo)) tipos.push(docTipo(d.tipo)); });
    el.innerHTML = topo + (tipos.length ? tipos.map(t=>{
      const list = ds.filter(d=>d.tipo===t.k);
      return `<div class="mg-sec"><span class="sw" style="background:${t.hex}"></span><span class="t">${esc(t.label)}</span><span class="c">${list.length}</span></div>
        <div class="dgrid">${list.map(docCardHTML).join('')}</div>`;
    }).join('') : `<div class="mg-empty">Nenhum documento para este cliente ainda.</div>`);
  }
  else{
    const t = docTipo(DVIEW.id);
    const html = CLIENTS.map(c=>{
      const list = DOCS.filter(d=>d.client_id===c.id && d.tipo===t.k);
      if(!list.length) return '';
      return `<div class="mg-sec">${clientChipHTML(c.id)}<span class="c">${list.length}</span></div>
        <div class="dgrid">${list.map(docCardHTML).join('')}</div>`;
    }).join('');
    el.innerHTML = topo + (html || `<div class="mg-empty">Nenhum documento nesta categoria.</div>`);
  }
}
/* envio de documento (admin) — grava no Storage e na tabela */
function uploadDoc(){
  if(!isAdmin()) return;
  const cliOpts = CLIENTS.map(c=>`<option value="${esc(c.id)}">${esc(c.nome)}</option>`).join('');
  const tpOpts  = DOC_TIPOS.map(t=>`<option value="${t.k}">${esc(t.label)}</option>`).join('');
  const wrap = document.createElement('div');
  wrap.innerHTML = `<div id="mg-upl" style="position:fixed;inset:0;background:rgba(10,10,9,.55);display:grid;place-items:center;z-index:80;padding:20px">
    <div style="background:var(--paper);border:1px solid var(--line2);border-radius:16px;max-width:440px;width:100%;padding:22px">
      <h3 style="font-family:var(--font-d);font-size:19px;font-weight:500;margin-bottom:14px">Enviar documento</h3>
      <label style="display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;font-weight:700;color:var(--muted);margin:12px 0 6px">Cliente</label>
      <select id="ud-cli" style="width:100%;background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--text)">${cliOpts}</select>
      <label style="display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;font-weight:700;color:var(--muted);margin:12px 0 6px">Tipo</label>
      <select id="ud-tp" style="width:100%;background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--text)">${tpOpts}</select>
      <label style="display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;font-weight:700;color:var(--muted);margin:12px 0 6px">Título</label>
      <input id="ud-ti" type="text" placeholder="ex.: Apresentação de resultados · Julho" style="width:100%;background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--text)">
      <label style="display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;font-weight:700;color:var(--muted);margin:12px 0 6px">Arquivo</label>
      <input id="ud-f" type="file" style="width:100%;font-size:12.5px;color:var(--muted)">
      <div style="display:flex;gap:9px;justify-content:flex-end;margin-top:18px">
        <button class="btn-g" onclick="document.getElementById('mg-upl').remove()">Cancelar</button>
        <button class="btn-p" id="ud-go">Enviar</button>
      </div>
      <div id="ud-st" style="font-size:12px;color:var(--muted);margin-top:10px"></div>
    </div></div>`;
  document.body.appendChild(wrap.firstChild);
  $('ud-go').onclick = async ()=>{
    const cid=$('ud-cli').value, tp=$('ud-tp').value, ti=$('ud-ti').value.trim(), f=$('ud-f').files[0];
    if(!ti){ $('ud-st').textContent='Dê um título ao documento.'; return }
    if(!f){ $('ud-st').textContent='Escolha um arquivo.'; return }
    $('ud-st').textContent='Enviando…'; $('ud-go').disabled=true;
    try{
      const ext = (f.name.split('.').pop()||'bin').toLowerCase();
      const path = `${cid}/${(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2))}.${ext}`;
      const up = await sb.storage.from('documents').upload(path, f, {upsert:false});
      if(up.error) throw up.error;
      const ins = await sb.from('documents').insert({client_id:cid, titulo:ti, tipo:tp, storage_path:path});
      if(ins.error) throw ins.error;
      $('mg-upl').remove();
      DOCS_LOADED=false; renderDocsView();
      toast('Documento publicado ✓');
    }catch(e){
      $('ud-st').textContent = 'Erro: '+(e.message||'falhou');
      $('ud-go').disabled=false;
    }
  };
}

/* =====================================================================
   CHAT
   Detecta sozinho se as tabelas (channels / channel_members / messages)
   já existem no banco. Se existirem → conversa real, com realtime.
   Se não → mostra o SQL pronto para criar, com um clique para copiar.
   ===================================================================== */
let CH_READY = null;      /* null=checando, true=tabelas ok, false=faltam */
let CHANNELS = [];
let CHAN = null;
let CHMSGS = {};
let CH_SUB = null;
let CH_FILTER = '';

const CHAT_SQL = `-- Chat da plataforma Modesto — rode no SQL Editor do Supabase
create table if not exists public.channels (
  id uuid primary key default gen_random_uuid(),
  tipo text not null check (tipo in ('client','team','dm')),
  nome text not null,
  client_id uuid references public.clients(id) on delete cascade,
  created_by uuid references public.profiles(id),
  created_at timestamptz not null default now()
);
create table if not exists public.channel_members (
  channel_id uuid not null references public.channels(id) on delete cascade,
  profile_id uuid not null references public.profiles(id) on delete cascade,
  last_read_at timestamptz not null default now(),
  primary key (channel_id, profile_id)
);
create table if not exists public.messages (
  id uuid primary key default gen_random_uuid(),
  channel_id uuid not null references public.channels(id) on delete cascade,
  author_id uuid references public.profiles(id),
  author_name text,
  body text not null,
  kind text not null default 'user',
  created_at timestamptz not null default now()
);
create index if not exists messages_ch_idx on public.messages(channel_id, created_at desc);

-- quem pode ver um canal
create or replace function public.can_see_channel(cid uuid)
returns boolean language sql security definer stable as $$
  select exists (select 1 from public.channel_members m
                  where m.channel_id = cid and m.profile_id = auth.uid())
      or public.is_admin()
      or exists (select 1 from public.channels c
                  where c.id = cid and c.tipo='client'
                    and c.client_id = public.current_client_id());
$$;

alter table public.channels        enable row level security;
alter table public.channel_members enable row level security;
alter table public.messages        enable row level security;

create policy ch_sel  on public.channels        for select using (public.can_see_channel(id));
create policy chm_sel on public.channel_members for select using (public.can_see_channel(channel_id));
create policy msg_sel on public.messages        for select using (public.can_see_channel(channel_id));
create policy msg_ins on public.messages        for insert with check (public.can_see_channel(channel_id) and author_id = auth.uid());
create policy ch_ins  on public.channels        for insert with check (public.is_admin());
create policy chm_ins on public.channel_members for insert with check (public.is_admin());

-- realtime
alter publication supabase_realtime add table public.messages;`;

async function checkChatTables(){
  try{
    const {error} = await sb.from('channels').select('id').limit(1);
    CH_READY = !error;
    if(error) window._chErr = error.message;
  }catch(e){ CH_READY=false; window._chErr = e.message }
}
async function loadChannels(){
  const {data,error} = await sb.from('channels').select('*').order('tipo').order('nome');
  if(error) throw error;
  CHANNELS = data||[];
  if(!CHAN && CHANNELS.length) CHAN = CHANNELS[0].id;
}
async function loadMsgs(cid){
  const {data,error} = await sb.from('messages').select('*').eq('channel_id',cid).order('created_at',{ascending:true}).limit(200);
  if(error) throw error;
  CHMSGS[cid] = data||[];
}
function chSubscribe(){
  if(CH_SUB) return;
  CH_SUB = sb.channel('chat-rt').on('postgres_changes',
    {event:'INSERT', schema:'public', table:'messages'},
    p=>{
      const m = p.new;
      (CHMSGS[m.channel_id] = CHMSGS[m.channel_id]||[]).push(m);
      if(m.channel_id===CHAN && VIEW==='chat') renderChatView();
    }).subscribe();
}
function chFilter(v){ CH_FILTER=(v||'').toLowerCase(); renderChatView(); }
async function openChan(id){
  CHAN = id;
  if(!CHMSGS[id]){ try{ await loadMsgs(id) }catch(e){ console.warn(e) } }
  renderChatView();
}
function chTime(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') }
function chDay(ts){
  const d=new Date(ts), h=new Date(), o=new Date(Date.now()-864e5);
  if(d.toDateString()===h.toDateString()) return 'Hoje';
  if(d.toDateString()===o.toDateString()) return 'Ontem';
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function renderChatView(){
  const el = $('v-chat');
  if(CH_READY===null){
    el.innerHTML = `<div class="mg-load" style="margin:auto">Verificando o chat…</div>`;
    checkChatTables().then(async()=>{
      if(CH_READY){ try{ await loadChannels(); if(CHAN) await loadMsgs(CHAN); chSubscribe(); }catch(e){ console.warn(e) } }
      renderChatView();
    });
    return;
  }
  if(CH_READY===false){
    el.innerHTML = `<div class="mgc-setup">
      <h3>Chat — falta criar as tabelas</h3>
      <p>O chat usa três tabelas no mesmo banco (<b>channels</b>, <b>channel_members</b> e <b>messages</b>), com as mesmas regras de acesso que já protegem as demandas e os documentos. Rode o SQL abaixo no <b>SQL Editor do Supabase</b> e recarregue esta página — o chat liga sozinho.</p>
      <div class="mgc-sql" id="mgc-sql">${esc(CHAT_SQL)}</div>
      <button class="btn-p" onclick="copyChatSQL()">Copiar SQL</button>
      <p style="margin-top:14px;font-size:12px">${esc(window._chErr||'')}</p>
    </div>`;
    return;
  }
  /* --- modo real --- */
  const f = c => !CH_FILTER || (c.nome||'').toLowerCase().includes(CH_FILTER);
  const grupo = (tipo,label,addable) => {
    const cs = CHANNELS.filter(c=>c.tipo===tipo && f(c));
    if(!cs.length && CH_FILTER) return '';
    return `<div class="mgc-sec">${label}${addable&&isAdmin()?`<button class="add" title="Novo canal" onclick="newChannel('${tipo}')">+</button>`:''}</div>`
      + (cs.length ? cs.map(c=>`<button class="mgc-i ${c.id===CHAN?'on':''}" onclick="openChan('${c.id}')">
            <span class="h">${tipo==='dm'?'◍':'#'}</span><span class="nm">${esc(c.nome)}</span></button>`).join('')
        : `<div style="font-size:11.5px;color:var(--muted2);padding:4px 10px">nenhum</div>`);
  };
  const cur = CHANNELS.find(c=>c.id===CHAN);
  const msgs = (CHMSGS[CHAN]||[]);
  let lastDay = '';
  const msgsHTML = msgs.length ? msgs.map(m=>{
    let sep = '';
    const dd = chDay(m.created_at);
    if(dd!==lastDay){ lastDay=dd; sep = `<div class="mgc-day">${dd}</div>` }
    if(m.kind==='system'){
      return sep + `<div class="mgc-sys"><span class="sw" style="background:var(--brass)"></span><span>${esc(m.body)}</span><span class="from">sistema</span></div>`;
    }
    const eu = ME && m.author_id===ME.id;
    return sep + `<div class="mgc-m">
      <div class="av" style="background:${eu?'var(--brass)':'#7C8A97'}">${esc(initials(m.author_name||'?'))}</div>
      <div class="bd">
        <div class="hd"><span class="who">${esc(m.author_name||'—')}</span><span class="tm">${chTime(m.created_at)}</span></div>
        <div class="tx">${esc(m.body)}</div>
      </div></div>`;
  }).join('') : `<div class="mg-empty" style="margin:auto">Nenhuma mensagem ainda. Diga oi!</div>`;

  el.innerHTML = `
    <aside class="mgc-side">
      <div class="mgc-search"><span style="opacity:.5">⌕</span><input placeholder="Buscar conversa…" value="${esc(CH_FILTER)}" oninput="chFilter(this.value)"></div>
      <div class="mgc-list">
        ${grupo('client','Clientes',true)}
        ${grupo('team','Equipe',true)}
        ${grupo('dm','Conversas diretas',false)}
      </div>
    </aside>
    <div class="mgc-main">
      <div class="mgc-top">
        <div class="nm">${cur?(cur.tipo==='dm'?'':'#')+esc(cur.nome):'—'}</div>
        <div class="sub">${cur?(cur.tipo==='client'?'equipe ↔ '+esc(clientName(cur.client_id)):cur.tipo==='team'?'canal interno':'conversa direta'):''}</div>
        <div class="sp"></div>
      </div>
      <div class="mgc-msgs" id="mgc-msgs">${msgsHTML}</div>
      <div class="mgc-comp">
        <div class="mgc-box">
          <textarea id="mgc-in" rows="1" placeholder="${cur?('Mensagem para '+(cur.tipo==='dm'?'':'#')+esc(cur.nome)+'…'):'Mensagem…'}" onkeydown="chKey(event)"></textarea>
          <button class="snd" onclick="chSend()" title="Enviar">➤</button>
        </div>
        <div class="mgc-hint">Enter envia · Shift+Enter quebra linha · digite <b>#adicionardemanda</b> para criar uma demanda no Kanban <button onclick="chExample()">ver exemplo</button></div>
      </div>
    </div>`;
  const box = $('mgc-msgs'); if(box) box.scrollTop = box.scrollHeight;
}
function copyChatSQL(){
  navigator.clipboard.writeText(CHAT_SQL).then(()=>toast('SQL copiado — cole no SQL Editor do Supabase'))
    .catch(()=>toast('Copie manualmente o bloco acima'));
}
function chKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); chSend(); return }
  const ta=e.target; setTimeout(()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px' },0);
}
function chExample(){
  const cur = CHANNELS.find(c=>c.id===CHAN);
  const linhaCli = (cur && cur.tipo==='client') ? '' : '\ncliente: '+(CLIENTS[0]?CLIENTS[0].nome:'');
  const ta=$('mgc-in'); if(!ta) return;
  ta.value = '#adicionardemanda\ntitulo: Ajustar gráfico de faturamento'+linhaCli+'\nresponsavel: '+(ASSIGNEE_OPTS[0]||'')+'\nprazo: '+fmtDate(new Date(Date.now()+7*864e5).toISOString().slice(0,10))+'\nprioridade: Alta';
  ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; ta.focus();
  toast(cur&&cur.tipo==='client' ? 'Canal de cliente: o cliente já entra automático' : 'Edite e aperte Enter');
}
async function chSend(){
  const ta=$('mgc-in'); if(!ta) return;
  const v=ta.value.trim(); if(!v || !CHAN) return;
  ta.value=''; ta.style.height='auto';
  try{
    const {data,error} = await sb.from('messages').insert({
      channel_id:CHAN, author_id:ME.id, author_name:ME.name, body:v
    }).select().single();
    if(error) throw error;
    if(!(CHMSGS[CHAN]||[]).some(m=>m.id===data.id)) (CHMSGS[CHAN]=CHMSGS[CHAN]||[]).push(data);
    renderChatView();
  }catch(e){ toast('Não foi possível enviar: '+(e.message||'erro')); return }
  if(/#adicionardemanda\b/i.test(v)) chCriarDemanda(v);
}
/* ---- mensagem → demanda no Kanban ---- */
async function chCriarDemanda(texto){
  const cur = CHANNELS.find(c=>c.id===CHAN);
  const campos = {}; let inline='';
  texto.split(/\r?\n/).forEach(l=>{
    l=l.trim(); if(!l) return;
    const m = l.match(/^(t[íi]tulo|cliente|respons[áa]ve(?:l|is)|prazo|prioridade|descri[çc][ãa]o)\s*:\s*(.+)$/i);
    if(m){
      let k=m[1].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      k = k.startsWith('titulo')?'titulo' : k.startsWith('cliente')?'cliente'
        : k.startsWith('responsave')?'resp' : k.startsWith('prazo')?'prazo'
        : k.startsWith('priorid')?'prio' : 'desc';
      campos[k]=m[2].trim();
    } else if(/#adicionardemanda/i.test(l)){ inline = l.replace(/#adicionardemanda/i,'').trim(); }
  });
  const titulo = campos.titulo || inline;
  if(!titulo){ toast('Informe ao menos um título na demanda'); return }

  let cid = null;
  if(campos.cliente){
    const f = CLIENTS.find(c=>(c.nome||'').toLowerCase().includes(campos.cliente.toLowerCase()));
    if(f) cid=f.id;
  }
  if(!cid && cur && cur.tipo==='client') cid = cur.client_id;

  let who=[];
  if(campos.resp){
    campos.resp.split(/[,;\/]+/).map(s=>s.trim()).filter(Boolean).forEach(nm=>{
      const p = (ASSIGNEE_OPTS||[]).find(x=>x.toLowerCase().split(' ')[0]===nm.toLowerCase().split(' ')[0]);
      if(p) who.push(p);
    });
  }
  let prazo=null;
  if(campos.prazo){
    const iso=campos.prazo.match(/^(\d{4})-(\d{2})-(\d{2})$/), br=campos.prazo.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(iso) prazo=campos.prazo; else if(br) prazo=`${br[3]}-${br[2]}-${br[1]}`;
  }
  let prio='Média';
  if(campos.prio){ const p=campos.prio.toLowerCase(); prio = p.startsWith('alt')?'Alta' : p.startsWith('baix')?'Baixa' : 'Média' }

  try{
    const {error} = await sb.from('tasks').insert({
      client_id: cid, title: titulo, status:'Não iniciado',
      assignees: who, prazo: prazo, prioridade: prio,
      description: campos.desc || ('Criada pelo chat em #'+(cur?cur.nome:'')+' por '+(ME?ME.name:'')+'.')
    });
    if(error) throw error;
    const resumo = [cid?('cliente: '+clientName(cid)):'', who.length?('resp.: '+who.join(', ')):'', prazo?('prazo: '+fmtDate(prazo)):'', 'prioridade: '+prio].filter(Boolean).join(' · ');
    await sb.from('messages').insert({
      channel_id: CHAN, author_id: ME.id, author_name:'Tasks', kind:'system',
      body: `Demanda criada no Kanban: “${titulo}” — ${resumo}`
    });
    await loadMsgs(CHAN); renderChatView();
    if(typeof loadTasks==='function') await loadTasks();
    toast('Demanda criada no Kanban ✓');
  }catch(e){ toast('Não foi possível criar a demanda: '+(e.message||'erro')) }
}
/* ---- novo canal (admin) ---- */
async function newChannel(tipo){
  if(!isAdmin()) return;
  let nome = prompt(tipo==='client' ? 'Nome do canal (será vinculado a um cliente):' : 'Nome do canal interno:');
  if(!nome) return;
  nome = nome.trim().toLowerCase().replace(/\s+/g,'-');
  let client_id = null;
  if(tipo==='client'){
    const lista = CLIENTS.map((c,i)=>`${i+1}. ${c.nome}`).join('\n');
    const esc2 = prompt('Vincular a qual cliente?\n'+lista+'\n\nDigite o número:');
    const idx = parseInt(esc2,10)-1;
    if(isNaN(idx) || !CLIENTS[idx]) { toast('Cliente inválido'); return }
    client_id = CLIENTS[idx].id;
  }
  try{
    const {data,error} = await sb.from('channels').insert({tipo, nome, client_id, created_by: ME.id}).select().single();
    if(error) throw error;
    await sb.from('channel_members').insert({channel_id:data.id, profile_id:ME.id}).then(()=>{}, ()=>{});
    await loadChannels(); CHAN=data.id; CHMSGS[data.id]=[]; renderChatView();
    toast('Canal #'+nome+' criado');
  }catch(e){ toast('Não foi possível criar: '+(e.message||'erro')) }
}
</script>
<script>
/* =====================================================================
   ADIÇÃO 2
   • tira o Dashboard do menu
   • barra lateral estreita (ícone em cima, rótulo embaixo)
   • chat já configurado: um canal por cliente + canais da equipe + diretas,
     com os membros certos — cada conta enxerga só o que é dela (RLS)
   • comando #adicionardocumento, irmão do #adicionardemanda

/* ---------- 2. logo do cliente ---------- */
function mgClientLogo(cid, px){
  const c = CLIENTS.find(x=>x.id===cid);
  const s = px||20;
  if(!c) return `<span class="mg-lg" style="width:${s}px;height:${s}px;background:#8a8271">?</span>`;
  if(c.logo_url) return `<span class="mg-lg" style="width:${s}px;height:${s}px"><img src="${esc(c.logo_url)}" alt=""></span>`;
  return `<span class="mg-lg" style="width:${s}px;height:${s}px;background:${clientColor(cid)}">${esc((c.nome||'?')[0].toUpperCase())}</span>`;
}

/* ---------- 3. chat já configurado por conta ---------- */
let MG_PROFILES = [];
let CH_PROV = false;

async function mgLoadProfiles(){
  const {data,error} = await sb.from('profiles').select('id,nome,role,client_id');
  if(error) throw error;
  MG_PROFILES = data||[];
}
const mgSlug = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40);

/* cria o que faltar: 1 canal por cliente, canais internos e diretas.
   Só admin provisiona (a RLS exige). Cliente apenas enxerga o que é dele. */
async function ensureChannels(){
  if(CH_PROV || !isAdmin()) return;
  CH_PROV = true;
  try{
    if(!MG_PROFILES.length) await mgLoadProfiles();
    const admins  = MG_PROFILES.filter(p=>p.role==='admin');
    const criados = [];

    const addMembers = async (chId, ids)=>{
      const rows = [...new Set(ids)].filter(Boolean).map(pid=>({channel_id:chId, profile_id:pid}));
      if(!rows.length) return;
      try{ await sb.from('channel_members').upsert(rows,{onConflict:'channel_id,profile_id'}) }
      catch(e){ try{ await sb.from('channel_members').insert(rows) }catch(_){} }
    };

    /* 3.1 — um canal por cliente (equipe ↔ pessoas daquele cliente) */
    for(const c of CLIENTS){
      let ch = CHANNELS.find(x=>x.tipo==='client' && x.client_id===c.id);
      if(!ch){
        const {data,error} = await sb.from('channels')
          .insert({tipo:'client', nome:mgSlug(c.nome), client_id:c.id, created_by:ME.id})
          .select().single();
        if(error) continue;
        ch = data; criados.push('#'+ch.nome);
      }
      const doCliente = MG_PROFILES.filter(p=>p.client_id===c.id).map(p=>p.id);
      await addMembers(ch.id, [...admins.map(a=>a.id), ...doCliente]);
    }

    /* 3.2 — canais internos da equipe */
    for(const nome of ['geral','entregas']){
      let ch = CHANNELS.find(x=>x.tipo==='team' && x.nome===nome);
      if(!ch){
        const {data,error} = await sb.from('channels')
          .insert({tipo:'team', nome, client_id:null, created_by:ME.id}).select().single();
        if(error) continue;
        ch = data; criados.push('#'+ch.nome);
      }
      await addMembers(ch.id, admins.map(a=>a.id));
    }

    /* 3.3 — conversas diretas entre as pessoas da equipe */
    for(const p of admins){
      if(p.id===ME.id) continue;
      const par = [ME.name||'Eu', p.nome||'—'].sort((a,b)=>a.localeCompare(b,'pt'));
      const nome = par.join(' ↔ ');
      let ch = CHANNELS.find(x=>x.tipo==='dm' && x.nome===nome);
      if(!ch){
        const {data,error} = await sb.from('channels')
          .insert({tipo:'dm', nome, client_id:null, created_by:ME.id}).select().single();
        if(error) continue;
        ch = data;
      }
      await addMembers(ch.id, [ME.id, p.id]);
    }

    if(criados.length){
      await loadChannels();
      toast('Chat configurado: '+criados.slice(0,3).join(', ')+(criados.length>3?' e mais':''));
    }
  }catch(e){ console.warn('[chat provisionamento]', e) }
}

/* nome de exibição: em conversa direta mostra o outro, não você */
function mgChanNome(c){
  if(!c) return '—';
  if(c.tipo==='dm' && c.nome.includes('↔')){
    const partes = c.nome.split('↔').map(s=>s.trim());
    const eu = (ME&&ME.name||'').trim();
    return partes.find(p=>p!==eu) || partes[0];
  }
  return c.nome;
}

/* ---------- 4. chat: redesenho da lista com logo + provisionamento ---------- */
const _mg2RenderChat = renderChatView;
renderChatView = function(){
  _mg2RenderChat();
  if(CH_READY!==true) return;

  /* provisiona uma vez, depois redesenha */
  if(!CH_PROV && isAdmin()){
    ensureChannels().then(()=>{ CH_PROV=true; renderChatView(); });
    if(!CHANNELS.length){
      const el=$('v-chat');
      if(el) el.innerHTML = `<div class="mgc-prov"><h3>Preparando o chat…</h3>
        <p>Criando um canal para cada cliente, os canais internos da equipe e as conversas diretas.</p></div>`;
      return;
    }
  }
  /* aplica logo do cliente e nome correto das diretas */
  document.querySelectorAll('#v-chat .mgc-i').forEach(btn=>{
    const m = (btn.getAttribute('onclick')||'').match(/openChan\('([^']+)'\)/);
    if(!m) return;
    const c = CHANNELS.find(x=>x.id===m[1]); if(!c) return;
    const h = btn.querySelector('.h'), nm = btn.querySelector('.nm');
    if(c.tipo==='client' && h) h.outerHTML = mgClientLogo(c.client_id,20);
    if(nm) nm.textContent = mgChanNome(c);
  });
  const top = document.querySelector('#v-chat .mgc-top .nm');
  const cur = CHANNELS.find(c=>c.id===CHAN);
  if(top && cur){
    top.innerHTML = (cur.tipo==='client' ? mgClientLogo(cur.client_id,26) : '')
      + `<span>${cur.tipo==='dm'?'':'#'}${esc(mgChanNome(cur))}</span>`;
  }
  /* atalhos dos comandos */
  const hint = document.querySelector('#v-chat .mgc-hint');
  if(hint && !hint.dataset.mg){
    hint.dataset.mg = '1';
    hint.insertAdjacentHTML('beforeend',
      `<div class="mgc-cmds">
         <button onclick="chExample()">#adicionardemanda</button>
         <button onclick="chDocExample()">#adicionardocumento</button>
       </div>`);
  }
};

/* ---------- 5. comando #adicionardocumento ---------- */
function chDocExample(){
  const cur = CHANNELS.find(c=>c.id===CHAN);
  const linhaCli = (cur && cur.tipo==='client') ? '' : '\ncliente: '+(CLIENTS[0]?CLIENTS[0].nome:'');
  const ta=$('mgc-in'); if(!ta) return;
  ta.value = '#adicionardocumento\ntitulo: Apresentação de resultados · Julho'+linhaCli
           + '\ntipo: apresentacao\nlink: https://…\ndescricao: Fechamento do mês com destaques.';
  ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,140)+'px'; ta.focus();
  toast('Tipos: apresentacao · proposta · diagnostico · weekly · concorrencia');
}
async function chCriarDocumento(texto){
  const cur = CHANNELS.find(c=>c.id===CHAN);
  const campos={}; let inline='';
  texto.split(/\r?\n/).forEach(l=>{
    l=l.trim(); if(!l) return;
    const m=l.match(/^(t[íi]tulo|cliente|tipo|link|url|descri[çc][ãa]o)\s*:\s*(.+)$/i);
    if(m){
      let k=m[1].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      k = k.startsWith('titulo')?'titulo' : k.startsWith('cliente')?'cliente'
        : k.startsWith('tipo')?'tipo' : (k==='link'||k==='url')?'link' : 'desc';
      campos[k]=m[2].trim();
    } else if(/#adicionardocumento/i.test(l)){ inline=l.replace(/#adicionardocumento/i,'').trim() }
  });
  const titulo = campos.titulo || inline;
  if(!titulo){ toast('Informe ao menos um título do documento'); return }

  let cid=null;
  if(campos.cliente){
    const f=CLIENTS.find(c=>(c.nome||'').toLowerCase().includes(campos.cliente.toLowerCase()));
    if(f) cid=f.id;
  }
  if(!cid && cur && cur.tipo==='client') cid=cur.client_id;
  if(!cid){ toast('Diga de qual cliente é o documento (cliente: …)'); return }

  let tipo=(campos.tipo||'apresentacao').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(tipo.startsWith('apres')) tipo='apresentacao';
  else if(tipo.startsWith('prop')) tipo='proposta';
  else if(tipo.startsWith('diag')) tipo='diagnostico';
  else if(tipo.startsWith('week')||tipo.startsWith('semanal')) tipo='weekly';
  else if(tipo.startsWith('concorr')) tipo='concorrencia';

  try{
    const {error} = await sb.from('documents').insert({
      client_id: cid, titulo, tipo,
      metadata: {origem:'chat', link: campos.link||null, descricao: campos.desc||null, por: ME?ME.name:null}
    });
    if(error) throw error;
    await sb.from('messages').insert({
      channel_id: CHAN, author_id: ME.id, author_name:'Documentos', kind:'system',
      body:`Documento adicionado à pasta de ${clientName(cid)}: “${titulo}” (${tipo})`
    });
    DOCS_LOADED=false;
    await loadMsgs(CHAN); renderChatView();
    toast('Documento adicionado à pasta ✓');
  }catch(e){
    const msg = (e.message||'');
    if(/invalid input value for enum|storage_path/i.test(msg)){
      toast('O banco ainda não aceita esse campo — veja o aviso no chat');
      await sb.from('messages').insert({
        channel_id: CHAN, author_id: ME.id, author_name:'Documentos', kind:'system',
        body:'Para aceitar este documento, rode no Supabase: '
           + "alter type doc_tipo add value if not exists 'diagnostico'; "
           + "alter type doc_tipo add value if not exists 'weekly'; "
           + 'alter table public.documents alter column storage_path drop not null;'
      }).catch(()=>{});
      await loadMsgs(CHAN); renderChatView();
    } else toast('Não foi possível adicionar: '+msg);
  }
}
/* liga o comando ao envio, sem alterar o chSend original */
const _mg2ChSend = chSend;
chSend = async function(){
  const ta=$('mgc-in');
  const txt = ta ? ta.value.trim() : '';
  await _mg2ChSend();
  if(/#adicionardocumento\b/i.test(txt)) chCriarDocumento(txt);
};

/* documentos vindos do chat abrem pelo link guardado */
const _mg2OpenDoc = openDoc;
openDoc = async function(id){
  const d = DOCS.find(x=>String(x.id)===String(id));
  if(d && !d.storage_path && d.metadata && d.metadata.link){
    window.open(d.metadata.link,'_blank','noopener'); return;
  }
  return _mg2OpenDoc(id);
};

<script>
/* =====================================================================
   ADIÇÃO 4
   • CLIENTE entra e vê SÓ a pasta de documentos da empresa dele
   • ADMIN ganha a aba "Acessos" para criar e-mail e senha do cliente
   ===================================================================== */

/* Abas liberadas para quem tem papel `client`.
   Para deixar o cliente conversar no chat também, use: ['docs','chat'] */
const ABAS_DO_CLIENTE = ['docs'];

/* ---------- 1. aba Acessos (só admin) ---------- */
(function(){
  if(!NAV.some(n=>n.v==='acessos')){
    const i = NAV.findIndex(n=>n.v==='settings');
    NAV.splice(i<0?NAV.length:i, 0, {v:'acessos', ic:'⚿', label:'Acessos', admin:true});
  }
})();
(function(){
  const cont = document.querySelector('.content');
  if(cont && !document.getElementById('v-acessos')){
    const d = document.createElement('div');
    d.className='view'; d.id='v-acessos';
    cont.appendChild(d);
  }
})();

/* ---------- 2. trava a navegação do cliente ---------- */
const _mg4ShowView = showView;
showView = function(v){
  if(!isAdmin() && !ABAS_DO_CLIENTE.includes(v)) v = ABAS_DO_CLIENTE[0];
  const r = _mg4ShowView(v);
  document.body.classList.toggle('mg-cliente', !isAdmin());
  return r;
};
const _mg4Render = render;
render = function(){
  if(VIEW==='acessos') return renderAcessos();
  return _mg4Render();
};
/* o menu do cliente mostra só o que ele pode abrir */
const _mg4BuildNav = buildNav;
buildNav = function(){
  if(isAdmin()) return _mg4BuildNav();
  $('nav').innerHTML = NAV.filter(n=>ABAS_DO_CLIENTE.includes(n.v)).map(n=>
    `<button class="nav-i ${n.v===VIEW?'on':''}" data-v="${n.v}" onclick="showView('${n.v}')" title="${esc(n.label)}" style="position:relative">
       <span class="ic">${n.ic}</span><span class="lb">${esc(n.label)}</span></button>`
  ).join('');
  document.body.classList.add('mg-cliente');
};
/* ao entrar, cliente cai direto na pasta dele */
(function(){
  const alvo = () => { if(ME && !isAdmin()) showView(ABAS_DO_CLIENTE[0]); };
  setTimeout(alvo, 400); setTimeout(alvo, 1500);
})();

/* ---------- 3. criar acesso do cliente ----------
   Sem chave secreta no navegador: usamos o cadastro normal do Supabase
   (a mesma chave pública de sempre) numa conexão paralela, para não
   derrubar a sua sessão de admin. O papel e a empresa vão junto, e o
   banco já cria o perfil amarrado ao cliente certo.                     */
let MG_SB2 = null;
let MG_ULTIMO_ACESSO = '';   /* credenciais recém-criadas, para não sumirem no redesenho */
function mgSb2(){
  if(MG_SB2) return MG_SB2;
  MG_SB2 = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth:{ storageKey:'mgp-cadastro', persistSession:false, autoRefreshToken:false, detectSessionInUrl:false }
  });
  return MG_SB2;
}
function mgSenhaForte(){
  const abc='abcdefghijkmnopqrstuvwxyz', ABC='ABCDEFGHJKLMNPQRSTUVWXYZ', num='23456789', sim='!@#$%&*';
  const todos=abc+ABC+num+sim; let s='';
  s+=ABC[Math.floor(Math.random()*ABC.length)];
  s+=abc[Math.floor(Math.random()*abc.length)];
  s+=num[Math.floor(Math.random()*num.length)];
  s+=sim[Math.floor(Math.random()*sim.length)];
  for(let i=0;i<8;i++) s+=todos[Math.floor(Math.random()*todos.length)];
  return s.split('').sort(()=>Math.random()-0.5).join('');
}
function gerarSenha(){ const el=$('ac-senha'); if(el){ el.value=mgSenhaForte(); el.type='text'; } }

async function renderAcessos(){
  if(VIEW!=='acessos') return;
  const {data} = await sb.from('profiles').select('id,nome,role,client_id');
  const clientes = (data||[]).filter(p=>p.role==='client');
  $('v-acessos').innerHTML = `
    <div class="mg-acc">
      <div class="bloco">
        <h3>Criar acesso de cliente</h3>
        <div class="desc">Gera o e-mail e a senha de login. A pessoa entra e enxerga <b>apenas os documentos da empresa dela</b> — a regra fica no banco, não na tela.</div>
        <label>Nome da pessoa</label>
        <input type="text" id="ac-nome" placeholder="ex.: Marina Costa">
        <label>E-mail</label>
        <input type="text" id="ac-email" placeholder="marina@empresa.com.br" autocomplete="off">
        <label>Senha</label>
        <div class="linha">
          <input type="text" id="ac-senha" placeholder="mínimo 6 caracteres">
          <button class="mini-btn" onclick="gerarSenha()">Gerar</button>
        </div>
        <label>Empresa</label>
        <select id="ac-cli">${CLIENTS.map(c=>`<option value="${esc(c.id)}">${esc(c.nome)}</option>`).join('')}</select>
        <div style="margin-top:16px"><button class="btn-p" id="ac-btn" onclick="criarAcesso()">Criar acesso</button></div>
        <div id="ac-res">${MG_ULTIMO_ACESSO}</div>
        <div class="aviso info"><span>ℹ</span><span>No Supabase, em <b>Authentication → Providers → Email</b>, deixe <b>“Allow new users to sign up”</b> ligado e <b>“Confirm email”</b> desligado — assim a pessoa já entra com a senha que você definiu, sem precisar confirmar por e-mail.</span></div>
      </div>
      <div class="bloco">
        <h3>Acessos de cliente já criados</h3>
        <div class="desc">${clientes.length} pessoa(s) com acesso restrito à própria empresa.</div>
        <div class="mg-users">${
          clientes.length ? clientes.map(p=>`<div class="u">
              <span class="nm">${esc(p.nome||'—')}</span>
              <span class="tag">${esc(clientName(p.client_id))}</span>
            </div>`).join('')
          : `<div class="desc" style="margin:0">Nenhum ainda.</div>`
        }</div>
      </div>
    </div>`;
}

async function criarAcesso(){
  const nome=($('ac-nome').value||'').trim();
  const email=($('ac-email').value||'').trim();
  const senha=($('ac-senha').value||'');
  const cid=$('ac-cli').value;
  const res=$('ac-res');
  const erro=m=>{ MG_ULTIMO_ACESSO=''; res.innerHTML=`<div class="aviso err"><span>⚠</span><span>${esc(m)}</span></div>` };

  if(!nome) return erro('Preencha o nome da pessoa.');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return erro('E-mail inválido.');
  if((senha||'').length<6) return erro('A senha precisa ter ao menos 6 caracteres.');
  if(!cid) return erro('Escolha a empresa.');

  $('ac-btn').disabled=true;
  res.innerHTML=`<div class="aviso info"><span>⏳</span><span>Criando acesso…</span></div>`;
  try{
    const {data,error} = await mgSb2().auth.signUp({
      email, password: senha,
      options:{ data:{ nome, role:'client', client_id: cid } }
    });
    if(error) throw error;
    const novoId = data && data.user ? data.user.id : null;

    /* garante que o perfil ficou com papel e empresa certos */
    if(novoId){
      await new Promise(r=>setTimeout(r,700));
      try{ await sb.from('profiles').update({nome, role:'client', client_id:cid}).eq('id',novoId) }catch(_){}
    }
    const precisaConfirmar = data && data.user && !data.user.confirmed_at && !data.session;
    MG_ULTIMO_ACESSO = `<div class="aviso ok"><span>✓</span><span><b>Acesso criado para ${esc(nome)}.</b>
        ${precisaConfirmar ? ' O Supabase está com confirmação de e-mail ligada — a pessoa precisa clicar no link que recebeu antes do primeiro login.' : ' Já pode entrar.'}
        <div class="cred">Endereço: ${location.origin+location.pathname}<br>E-mail: ${esc(email)}<br>Senha: ${esc(senha)}</div>
        <span style="font-size:11.5px;color:var(--muted)">Copie e envie por um canal seguro. A senha não fica guardada aqui.</span>
        <div style="margin-top:10px"><button class="mini-btn ghost" onclick="MG_ULTIMO_ACESSO='';renderAcessos()">Ocultar</button></div></span></div>`;
    res.innerHTML = MG_ULTIMO_ACESSO;
    $('ac-nome').value=''; $('ac-email').value=''; $('ac-senha').value='';
    renderAcessos();
    toast('Acesso criado ✓');
  }catch(e){
    const m=(e && e.message)||'falha';
    if(/signups? not allowed|disabled/i.test(m))
      erro('O Supabase está com cadastro de novos usuários desligado. Ligue em Authentication → Providers → Email → “Allow new users to sign up”.');
    else if(/already registered|already exists/i.test(m))
      erro('Já existe um usuário com esse e-mail.');
    else erro('Não foi possível criar: '+m);

}

<script>

   • Configurações vira janela, com conta e notificações

/* ---------- 1. sai a aba Equipe ---------- */
(function(){
  const i = NAV.findIndex(n=>n.v==='equipe');
  if(i>=0) NAV.splice(i,1);
})();

/* ---------- 2. engrenagem no lugar da logo pixelada ---------- */
const MG_GEAR_SVG = '<svg viewBox="0 0 24 24"><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.6-1.9-3.3-2.5 1a7.7 7.7 0 0 0-1.7-1l-.4-2.6h-3.8l-.4 2.6a7.7 7.7 0 0 0-1.7 1l-2.5-1L2.6 9.4 4.6 11a7.8 7.8 0 0 0 0 2l-2 1.6 1.9 3.3 2.5-1c.5.4 1.1.8 1.7 1l.4 2.6h3.8l.4-2.6c.6-.2 1.2-.6 1.7-1l2.5 1 1.9-3.3-2-1.6zM12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4z"/></svg>';
function mgEhGeral(cid){

}
const _mg5Logo = mgClientLogo;

/* ---------- 3. Configurações em janela ---------- */
(function(){

function fecharConfig(){ $('mg-cfg').classList.remove('on') }

function mgBlocosExtras(){

  return `
    <div class="set-sec">
      <h3>Conta</h3>

/* clicar em Configurações abre a janela em vez de trocar de tela */
const _mg5ShowView = showView;
showView = function(v){

  return _mg5ShowView(v);
};

/* ---------- 4. cadastro de cliente completo ---------- */
const _mg5RenderClientes = renderClientes;
renderClientes = async function(){
  await _mg5RenderClientes();
  if(VIEW!=='clientes') return;
  const bloco = document.querySelector('#v-clientes .set-sec');
  if(!bloco) return;
  bloco.innerHTML = `
    <h3>Adicionar cliente</h3>
    <div class="desc">Cadastre a empresa e, se quiser, já crie o acesso dela — a pessoa entra e vê somente os documentos dessa empresa.</div>
    <div class="mg-novocli">
      <div>
        <div class="rot">Nome da empresa</div>
        <input type="text" id="nc-nome" placeholder="ex.: Amakha Paris">
      </div>
      <div>
        <div class="rot">Resumo da empresa</div>
        <textarea id="nc-resumo" placeholder="Ramo, o que fazemos para ela, contexto do contrato…"></textarea>
      </div>

      <div id="nc-acesso" style="display:none;gap:10px" class="mg-novocli">
        <div class="par">
          <div><div class="rot">Nome da pessoa</div><input type="text" id="nc-pnome" placeholder="ex.: Marina Costa"></div>
          <div><div class="rot">E-mail de acesso</div><input type="text" id="nc-email" placeholder="marina@empresa.com.br" autocomplete="off"></div>
        </div>
        <div>
          <div class="rot">Senha</div>
          <div style="display:flex;gap:8px"><input type="text" id="nc-senha" placeholder="mínimo 6 caracteres"><button class="mini-btn" onclick="mgGerarSenhaCli()">Gerar</button></div>
        </div>
      </div>
      <div><button class="btn-p" id="nc-btn" onclick="criarClienteCompleto()">Criar cliente</button></div>
      <div id="nc-res"></div>

};
function mgToggleAcesso(){
  const on = $('nc-criar').checked;
  $('nc-acesso').style.display = on ? 'grid' : 'none';
  if(on && !$('nc-senha').value) mgGerarSenhaCli();
}
function mgGerarSenhaCli(){ const e=$('nc-senha'); if(e) e.value = mgSenhaForte(); }

async function criarClienteCompleto(){
  const nome=($('nc-nome').value||'').trim();
  const resumo=($('nc-resumo').value||'').trim();
  const criar=$('nc-criar').checked;
  const res=$('nc-res');
  const erro=m=>{ res.innerHTML=`<div class="mg-res err">⚠ ${esc(m)}</div>` };
  if(!nome) return erro('Dê um nome à empresa.');

  let pnome='', email='', senha='';
  if(criar){
    pnome=($('nc-pnome').value||'').trim();
    email=($('nc-email').value||'').trim();
    senha=($('nc-senha').value||'');
    if(!pnome) return erro('Informe o nome da pessoa que vai acessar.');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return erro('E-mail de acesso inválido.');
    if(senha.length<6) return erro('A senha precisa ter ao menos 6 caracteres.');
  }

  $('nc-btn').disabled=true;
  res.innerHTML=`<div class="mg-res">⏳ Criando…</div>`;
  try{
    /* cria a empresa (com resumo, se a coluna existir) */
    let novo=null, semColuna=false;
    let r = await sb.from('clients').insert(resumo?{nome,resumo}:{nome}).select().single();
    if(r.error && /resumo/i.test(r.error.message||'')){
      semColuna=true;
      r = await sb.from('clients').insert({nome}).select().single();
    }
    if(r.error) throw r.error;
    novo = r.data;

    await loadClients(); buildClientFilter();

    let aviso='';
    if(criar){
      const {data,error} = await mgSb2().auth.signUp({
        email, password: senha,
        options:{ data:{ nome:pnome, role:'client', client_id: novo.id } }
      });
      if(error) throw error;
      if(data && data.user){
        await new Promise(x=>setTimeout(x,700));
        try{ await sb.from('profiles').update({nome:pnome, role:'client', client_id:novo.id}).eq('id',data.user.id) }catch(_){}
      }
      const precisaConfirmar = data && data.user && !data.user.confirmed_at && !data.session;
      aviso = `<div class="cred">Endereço: ${location.origin+location.pathname}<br>E-mail: ${esc(email)}<br>Senha: ${esc(senha)}</div>
        ${precisaConfirmar?'<div style="margin-top:6px">A confirmação de e-mail está ligada no Supabase — a pessoa precisa clicar no link antes do primeiro login.</div>':''}
        <div style="font-size:11.5px;color:var(--muted);margin-top:6px">Copie e envie por um canal seguro. A senha não fica guardada aqui.</div>`;
    }
    res.innerHTML = `<div class="mg-res ok">✓ <b>${esc(nome)}</b> criada${criar?` com acesso para ${esc(pnome)}`:''}.
      ${semColuna?'<div style="margin-top:6px">O resumo não foi salvo: falta a coluna <b>resumo</b> na tabela <b>clients</b> (veja o SQL que te enviei).</div>':''}
      ${aviso}</div>`;
    $('nc-nome').value=''; $('nc-resumo').value=''; $('nc-pnome')&&($('nc-pnome').value=''); $('nc-email')&&($('nc-email').value=''); $('nc-senha')&&($('nc-senha').value='');
    toast('Cliente criado ✓');
  }catch(e){
    const m=(e&&e.message)||'falha';
    if(/signups? not allowed|disabled/i.test(m)) erro('A empresa foi criada, mas o Supabase está com cadastro de usuários desligado (Authentication → Providers → Email).');
    else if(/already registered|already exists/i.test(m)) erro('A empresa foi criada, mas já existe usuário com esse e-mail.');
    else erro('Não foi possível concluir: '+m);
  }finally{ $('nc-btn').disabled=false }
}

/* ---------- 5. cliente vê o resumo da própria empresa ---------- */
const _mg5Docs = renderDocsView;
renderDocsView = function(){
  _mg5Docs();
  if(isAdmin() || !ME || !ME.client_id || DVIEW.kind!=='home') return;
  const c = CLIENTS.find(x=>x.id===ME.client_id);
  if(!c || !c.resumo) return;

  if(el && !el.querySelector('.mg-resumo')){
    el.insertAdjacentHTML('afterbegin',
      `<div class="mg-resumo set-sec" style="margin-bottom:16px">
         <h3 style="display:flex;align-items:center;gap:9px">${mgClientLogo(c.id,24)} ${esc(c.nome)}</h3>

       </div>`);
  }
};

<script>
/* =====================================================================
   ADIÇÃO 6
   • tira a aba "Acessos" — criar acesso passa a existir só no cadastro
     de cliente novo
   • amarra o perfil do cliente à empresa de forma confiável, com
     verificação: se não conseguir, avisa em vez de falhar calado
   ===================================================================== */

/* ---------- 1. sai a aba Acessos ---------- */
(function(){
  const i = NAV.findIndex(n=>n.v==='acessos');
  if(i>=0) NAV.splice(i,1);
  const el = document.getElementById('v-acessos');
  if(el) el.remove();
  if($('nav') && $('nav').children.length) buildNav();
})();

/* ---------- 2. vínculo do perfil à empresa, com garantia ----------
   O banco cria o perfil sozinho por gatilho, mas isso leva um instante
   e nem sempre traz papel e empresa. Aqui a gente confere de verdade:
   tenta atualizar, tenta criar se não existir, e só declara sucesso
   depois de ler de volta e ver que ficou certo.                        */
async function mgVincularPerfil(userId, nome, clientId){
  for(let tentativa=0; tentativa<6; tentativa++){
    await new Promise(r=>setTimeout(r, tentativa===0 ? 500 : 700));

    /* já está correto? */
    const {data:atual} = await sb.from('profiles')
      .select('id,nome,role,client_id').eq('id',userId).maybeSingle();

    if(atual && atual.role==='client' && atual.client_id===clientId) return {ok:true};

    if(atual){
      await sb.from('profiles').update({nome, role:'client', client_id:clientId}).eq('id',userId);
    }else{
      /* o gatilho ainda não criou — tentamos criar nós mesmos */
      const {error} = await sb.from('profiles').insert({id:userId, nome, role:'client', client_id:clientId});
      if(error && !/duplicate|already exists/i.test(error.message||'')){
        if(tentativa>=3) return {ok:false, motivo:error.message};
      }
    }
  }
  const {data:fim} = await sb.from('profiles').select('role,client_id').eq('id',userId).maybeSingle();
  if(fim && fim.role==='client' && fim.client_id===clientId) return {ok:true};
  return {ok:false, motivo:'o perfil não ficou amarrado à empresa'};
}

/* ---------- 3. cadastro de cliente usando a verificação ---------- */
async function criarClienteCompleto(){
  const nome=($('nc-nome').value||'').trim();
  const resumo=($('nc-resumo').value||'').trim();
  const criar=$('nc-criar').checked;
  const res=$('nc-res');
  const erro=m=>{ res.innerHTML=`<div class="mg-res err">⚠ ${esc(m)}</div>` };
  if(!nome) return erro('Dê um nome à empresa.');

  let pnome='', email='', senha='';
  if(criar){
    pnome=($('nc-pnome').value||'').trim();
    email=($('nc-email').value||'').trim();
    senha=($('nc-senha').value||'');
    if(!pnome) return erro('Informe o nome da pessoa que vai acessar.');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return erro('E-mail de acesso inválido.');
    if(senha.length<6) return erro('A senha precisa ter ao menos 6 caracteres.');
  }

  $('nc-btn').disabled=true;
  res.innerHTML=`<div class="mg-res">⏳ Criando a empresa…</div>`;
  try{
    let semColuna=false;
    let r = await sb.from('clients').insert(resumo?{nome,resumo}:{nome}).select().single();
    if(r.error && /resumo/i.test(r.error.message||'')){
      semColuna=true;
      r = await sb.from('clients').insert({nome}).select().single();
    }
    if(r.error) throw r.error;
    const empresa = r.data;
    await loadClients(); buildClientFilter();

    let aviso='';
    if(criar){
      res.innerHTML=`<div class="mg-res">⏳ Criando o acesso de ${esc(pnome)}…</div>`;
      const {data,error} = await mgSb2().auth.signUp({
        email, password: senha,
        options:{ data:{ nome:pnome, role:'client', client_id: empresa.id } }
      });
      if(error) throw error;

      const uid = data && data.user ? data.user.id : null;
      let vinculo = {ok:false, motivo:'usuário não retornado'};
      if(uid){
        res.innerHTML=`<div class="mg-res">⏳ Amarrando o acesso à empresa…</div>`;
        vinculo = await mgVincularPerfil(uid, pnome, empresa.id);
      }
      const precisaConfirmar = data && data.user && !data.user.confirmed_at && !data.session;

      aviso = `<div class="cred">Endereço: ${location.origin+location.pathname}<br>E-mail: ${esc(email)}<br>Senha: ${esc(senha)}</div>`
        + (precisaConfirmar
            ? `<div style="margin-top:8px">⚠ A confirmação de e-mail está <b>ligada</b> no Supabase — ${esc(pnome)} precisa clicar no link recebido antes do primeiro login. Para evitar isso: Authentication → Providers → Email → desligue <b>Confirm email</b>.</div>`
            : '')
        + (vinculo.ok
            ? `<div style="margin-top:8px">✓ Perfil confirmado: <b>cliente de ${esc(nome)}</b> — vai enxergar somente os documentos dessa empresa.</div>`
            : `<div style="margin-top:8px">⚠ O login foi criado, mas <b>não consegui confirmar o vínculo com a empresa</b> (${esc(vinculo.motivo||'motivo desconhecido')}).
                 Abra o Supabase → Table Editor → <b>profiles</b> e ajuste a linha de ${esc(pnome)} para <b>role = client</b> e <b>client_id = ${esc(empresa.id)}</b>, senão ela entra sem ver nada.</div>`)
        + `<div style="font-size:11.5px;color:var(--muted);margin-top:8px">Copie e envie por um canal seguro. A senha não fica guardada aqui.</div>`;
    }

    res.innerHTML = `<div class="mg-res ok">✓ <b>${esc(nome)}</b> criada${criar?` com acesso para ${esc(pnome)}`:''}.
      ${semColuna?'<div style="margin-top:6px">O resumo não foi salvo: falta a coluna <b>resumo</b> na tabela <b>clients</b> (está no SQL que te enviei).</div>':''}
      ${aviso}
      <div style="margin-top:10px"><button class="mini-btn ghost" onclick="document.getElementById('nc-res').innerHTML=''">Ocultar</button></div></div>`;
    $('nc-nome').value=''; $('nc-resumo').value='';
    if($('nc-pnome')) $('nc-pnome').value='';
    if($('nc-email')) $('nc-email').value='';
    if($('nc-senha')) $('nc-senha').value='';
    toast('Cliente criado ✓');
  }catch(e){
    const m=(e&&e.message)||'falha';
    if(/signups? not allowed|disabled/i.test(m))
      erro('A empresa foi criada, mas o cadastro de usuários está desligado no Supabase (Authentication → Providers → Email → "Allow new users to sign up").');
    else if(/already registered|already exists/i.test(m))
      erro('A empresa foi criada, mas já existe um usuário com esse e-mail.');
    else erro('Não foi possível concluir: '+m);
  }finally{ $('nc-btn').disabled=false }
}
</script>
<style>
/* =====================================================================

   ===================================================================== */

/* ---- animação de entrada e saída das janelas ---- */
@keyframes mgFundoEntra{ from{opacity:0} to{opacity:1} }
@keyframes mgFundoSai  { from{opacity:1} to{opacity:0} }
@keyframes mgCaixaEntra{
  0%  { opacity:0; transform:translateY(18px) scale(.96) }
  60% { opacity:1 }
  100%{ opacity:1; transform:translateY(0) scale(1) }
}
@keyframes mgCaixaSai{
  from{ opacity:1; transform:translateY(0) scale(1) }

}
@keyframes mgSobe{
  from{ opacity:0; transform:translateY(10px) }

}

<script>
/* =====================================================================
   ADIÇÃO 7
   • cadastro de cliente vira janela, aberta por botão
   • janelas com animação de entrada e saída
   ===================================================================== */

/* ---- fechar com animação (vale para todas as janelas novas) ---- */
function mgFechar(id){
  const el = $(id); if(!el || !el.classList.contains('on')) return;
  el.classList.add('saindo');
  setTimeout(()=>{ el.classList.remove('on','saindo') }, 170);
}
fecharConfig = function(){ mgFechar('mg-cfg') };

/* ---- janela do cadastro de cliente ---- */
(function(){
  if(document.getElementById('mg-cli')) return;
  const el=document.createElement('div');
  el.className='mg-modal'; el.id='mg-cli';
  el.innerHTML=`<div class="cx">
    <div class="cb"><h2>Adicionar cliente</h2><button class="x" onclick="fecharNovoCliente()">✕</button></div>
    <div class="cc">
      <div class="mg-novocli">
        <div class="desc" style="font-size:12.5px;color:var(--muted);line-height:1.55">
          Cadastre a empresa e, se quiser, já crie o acesso dela — a pessoa entra e vê somente os documentos dessa empresa.
        </div>
        <div>
          <div class="rot">Nome da empresa</div>
          <input type="text" id="nc-nome" placeholder="ex.: Amakha Paris">
        </div>
        <div>
          <div class="rot">Resumo da empresa</div>
          <textarea id="nc-resumo" placeholder="Ramo, o que fazemos para ela, contexto do contrato…"></textarea>
        </div>
        <label class="op"><input type="checkbox" id="nc-criar" onchange="mgToggleAcesso()"> Criar também o acesso do cliente (e-mail e senha)</label>
        <div id="nc-acesso" class="mg-abre">
          <div class="mg-novocli" style="padding-top:10px">
            <div class="par">
              <div><div class="rot">Nome da pessoa</div><input type="text" id="nc-pnome" placeholder="ex.: Marina Costa"></div>
              <div><div class="rot">E-mail de acesso</div><input type="text" id="nc-email" placeholder="marina@empresa.com.br" autocomplete="off"></div>
            </div>
            <div>
              <div class="rot">Senha</div>
              <div style="display:flex;gap:8px">
                <input type="text" id="nc-senha" placeholder="mínimo 6 caracteres">
                <button class="mini-btn" onclick="mgGerarSenhaCli()">Gerar</button>
              </div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:9px;margin-top:4px">
          <button class="btn-p" id="nc-btn" onclick="criarClienteCompleto()">Criar cliente</button>
          <button class="mini-btn ghost" onclick="fecharNovoCliente()">Cancelar</button>
        </div>
        <div id="nc-res"></div>
      </div>
    </div>
  </div>`;
  el.addEventListener('click',e=>{ if(e.target===el) fecharNovoCliente() });
  document.body.appendChild(el);
})();

function abrirNovoCliente(){
  ['nc-nome','nc-resumo','nc-pnome','nc-email','nc-senha'].forEach(id=>{ const e=$(id); if(e) e.value='' });
  const c=$('nc-criar'); if(c) c.checked=false;
  const a=$('nc-acesso'); if(a) a.classList.remove('on');
  const r=$('nc-res'); if(r) r.innerHTML='';
  $('mg-cli').classList.add('on');
  setTimeout(()=>{ const n=$('nc-nome'); if(n) n.focus() }, 340);
}
function fecharNovoCliente(){ mgFechar('mg-cli') }

/* o bloco de acesso agora abre deslizando */
mgToggleAcesso = function(){
  const on = $('nc-criar').checked;
  $('nc-acesso').classList.toggle('on', on);
  if(on && !$('nc-senha').value) mgGerarSenhaCli();
  if(on) setTimeout(()=>{ const p=$('nc-pnome'); if(p) p.focus() }, 260);
};

/* ---- na tela de Clientes, o formulário vira um botão ---- */
const _mg7RenderClientes = renderClientes;
renderClientes = async function(){
  await _mg7RenderClientes();
  if(VIEW!=='clientes') return;
  const bloco = document.querySelector('#v-clientes .set-sec');
  if(!bloco) return;
  bloco.innerHTML = `
    <h3>Clientes</h3>
    <div class="desc">${CLIENTS.length} empresa(s) cadastrada(s). O acesso de cada cliente é criado junto com a empresa.</div>
    <button class="mg-add" onclick="abrirNovoCliente()"><span class="p">+</span>Adicionar cliente</button>`;
};

/* ---- ao criar com sucesso, atualiza a lista por trás ---- */
const _mg7Criar = criarClienteCompleto;
criarClienteCompleto = async function(){
  await _mg7Criar();
  if(VIEW==='clientes'){
    const lista = document.querySelector('#v-clientes .clist');
    if(lista){
      /* redesenha só a lista, preservando a janela aberta com o resultado */
      const guardado = $('nc-res') ? $('nc-res').innerHTML : '';
      await _mg7RenderClientes();
      const bloco = document.querySelector('#v-clientes .set-sec');
      if(bloco) bloco.innerHTML = `
        <h3>Clientes</h3>
        <div class="desc">${CLIENTS.length} empresa(s) cadastrada(s). O acesso de cada cliente é criado junto com a empresa.</div>
        <button class="mg-add" onclick="abrirNovoCliente()"><span class="p">+</span>Adicionar cliente</button>`;
      if(guardado && $('nc-res')) $('nc-res').innerHTML = guardado;
    }
  }
};

/* ---- fechar janelas com Esc ---- */
document.addEventListener('keydown', e=>{
  if(e.key!=='Escape') return;
  if($('mg-cli') && $('mg-cli').classList.contains('on')) return fecharNovoCliente();
  if($('mg-cfg') && $('mg-cfg').classList.contains('on')) return fecharConfig();
});
</script>

<script>
/* =====================================================================
   ADIÇÃO 8
   • linha do cliente com um único botão: Editar (janela com logo, nome,
     resumo e exclusão)
   • clicar no documento abre uma PÁGINA do documento, que mostra o
     conteúdo de verdade renderizado — e não o código-fonte
   ===================================================================== */

/* ---------- 1. janela de edição do cliente ---------- */
(function(){
  if(document.getElementById('mg-edcli')) return;
  const el=document.createElement('div');
  el.className='mg-modal'; el.id='mg-edcli';
  el.innerHTML=`<div class="cx" style="max-width:520px">
    <div class="cb"><h2>Editar cliente</h2><button class="x" onclick="fecharEditarCliente()">✕</button></div>
    <div class="cc">
      <div class="mg-novocli">
        <div class="mg-edit-logo">
          <span class="lg" id="ec-logo" onclick="ecTrocarLogo()"></span>
          <span class="tx"><b>Logo da empresa</b><br>Clique para enviar ou trocar a imagem.</span>
        </div>
        <div><div class="rot">Nome da empresa</div><input type="text" id="ec-nome"></div>
        <div><div class="rot">Resumo da empresa</div><textarea id="ec-resumo" placeholder="Ramo, o que fazemos para ela, contexto do contrato…"></textarea></div>
        <div style="display:flex;gap:9px;margin-top:4px">
          <button class="btn-p" id="ec-btn" onclick="salvarCliente()">Salvar</button>
          <button class="mini-btn ghost" onclick="fecharEditarCliente()">Cancelar</button>
        </div>
        <div id="ec-res"></div>
        <div class="mg-perigo">
          <div class="aviso">Excluir remove a empresa da lista. As demandas e documentos dela ficam sem vínculo.</div>
          <button class="mg-btn-perigo" onclick="excluirClienteDaJanela()">Excluir cliente</button>
        </div>
      </div>
    </div>
  </div>`;
  el.addEventListener('click',e=>{ if(e.target===el) fecharEditarCliente() });
  document.body.appendChild(el);
})();

let EC_ID = null;
function abrirEditarCliente(id){
  const c = CLIENTS.find(x=>x.id===id); if(!c) return;
  EC_ID = id;
  $('ec-nome').value = c.nome||'';
  $('ec-resumo').value = c.resumo||'';
  $('ec-res').innerHTML = '';
  $('ec-logo').innerHTML = c.logo_url
    ? `<img src="${esc(c.logo_url)}" alt="">`
    : `<span style="width:100%;height:100%;border-radius:11px;background:${clientColor(id)}"></span>`;
  $('mg-edcli').classList.add('on');
  setTimeout(()=>{ const n=$('ec-nome'); if(n) n.focus() },340);
}
function fecharEditarCliente(){ mgFechar('mg-edcli') }
function ecTrocarLogo(){ if(EC_ID && typeof pickClientLogo==='function') pickClientLogo(EC_ID) }

async function salvarCliente(){
  if(!EC_ID) return;
  const nome=($('ec-nome').value||'').trim();
  const resumo=($('ec-resumo').value||'').trim();
  const res=$('ec-res');
  if(!nome){ res.innerHTML=`<div class="mg-res err">⚠ O nome não pode ficar vazio.</div>`; return }
  $('ec-btn').disabled=true;
  try{
    let r = await sb.from('clients').update({nome, resumo}).eq('id',EC_ID);
    if(r.error && /resumo/i.test(r.error.message||'')){
      r = await sb.from('clients').update({nome}).eq('id',EC_ID);
      if(r.error) throw r.error;
      res.innerHTML=`<div class="mg-res ok">✓ Nome salvo. O resumo não foi: falta a coluna <b>resumo</b> em <b>clients</b> (está no SQL que te enviei).</div>`;
    }else{
      if(r.error) throw r.error;
      res.innerHTML=`<div class="mg-res ok">✓ Alterações salvas.</div>`;
    }
    await loadClients(); buildClientFilter();
    if(VIEW==='clientes') renderClientes();
    toast('Cliente atualizado');
    setTimeout(fecharEditarCliente, 700);
  }catch(e){
    res.innerHTML=`<div class="mg-res err">⚠ Não foi possível salvar: ${esc((e&&e.message)||'erro')}</div>`;
  }finally{ $('ec-btn').disabled=false }
}
async function excluirClienteDaJanela(){
  if(!EC_ID) return;
  const c = CLIENTS.find(x=>x.id===EC_ID); if(!c) return;
  fecharEditarCliente();
  setTimeout(()=>{ if(typeof deleteClient==='function') deleteClient(c.id, c.nome) }, 200);
}

/* linha do cliente com um botão só */
const _mg8RenderClientes = renderClientes;
renderClientes = async function(){
  await _mg8RenderClientes();
  if(VIEW!=='clientes') return;
  document.querySelectorAll('#v-clientes .crow').forEach(linha=>{
    /* o id sai de qualquer ação da linha, sem depender do formato dele */
    let id=null;
    linha.querySelectorAll('[onclick]').forEach(el=>{
      if(id) return;
      const oc = el.getAttribute('onclick')||'';
      const m = oc.match(/(?:pickClientLogo|renameClient|deleteClient)\(\s*(['"])(.*?)\1/);
      if(m) id = m[2];
    });
    if(!id) return;
    linha.querySelectorAll('.mini-btn').forEach(b=>b.remove());
    linha.insertAdjacentHTML('beforeend',
      `<button class="mini-btn ghost" onclick="abrirEditarCliente('${id}')">Editar</button>`);
  });
};

/* ---------- 2. página do documento ---------- */
function ehHTML(nomeOuPath){
  return /\.(html?|htm)(\?|$)/i.test(nomeOuPath||'');
}
/* clicar no card leva à página do documento, em vez de abrir direto */
openDoc = function(id){
  DVIEW = {kind:'doc', id:String(id)};
  renderDocsView();
};
function voltarDocs(){
  const d = DOCS.find(x=>String(x.id)===String(DVIEW.id));
  DVIEW = d ? {kind:'client', id:d.client_id} : {kind:'home'};
  renderDocsView();
}
/* abre o arquivo numa aba, com o tipo certo para renderizar */
async function abrirArquivoEmAba(id){
  const d = DOCS.find(x=>String(x.id)===String(id)); if(!d) return;
  if(!d.storage_path && d.metadata && d.metadata.link){ window.open(d.metadata.link,'_blank','noopener'); return }
  if(!d.storage_path){ toast('Documento sem arquivo anexado'); return }
  toast('Abrindo…');
  try{
    const {data,error} = await sb.storage.from('documents').createSignedUrl(d.storage_path, 120);
    if(error) throw error;
    if(ehHTML(d.storage_path)){
      /* o arquivo pode estar guardado como texto puro; reconstruímos como
         página para o navegador exibir o conteúdo, e não o código */
      try{
        const resp = await fetch(data.signedUrl);
        const txt  = await resp.text();
        const url  = URL.createObjectURL(new Blob([txt], {type:'text/html;charset=utf-8'}));
        window.open(url,'_blank','noopener');
        setTimeout(()=>URL.revokeObjectURL(url), 60000);
        return;
      }catch(_){ /* se não der, cai no link direto */ }
    }
    window.open(data.signedUrl,'_blank','noopener');
  }catch(e){ toast('Não foi possível abrir: '+((e&&e.message)||'erro')) }
}
async function baixarArquivo(id){
  const d = DOCS.find(x=>String(x.id)===String(id)); if(!d || !d.storage_path) return;
  try{
    const {data,error} = await sb.storage.from('documents').createSignedUrl(d.storage_path, 120, {download:true});
    if(error) throw error;
    window.open(data.signedUrl,'_blank','noopener');
  }catch(e){ toast('Não foi possível baixar: '+((e&&e.message)||'erro')) }
}
/* carrega o conteúdo dentro do visor */
async function carregarVisor(id){
  const d = DOCS.find(x=>String(x.id)===String(id)); if(!d) return;
  const box = $('mg-visor'); if(!box) return;
  const falha = (msg, extra) => {
    box.innerHTML = `<div class="falhou"><div><b>Não deu para exibir aqui.</b><br>${esc(msg)}
      ${extra?`<br><br>${extra}`:''}</div></div>`;
  };
  if(!d.storage_path){
    if(d.metadata && d.metadata.link){
      falha('Este documento foi cadastrado por link.',
        `<button class="btn-p" onclick="window.open('${esc(d.metadata.link)}','_blank','noopener')">Abrir o link</button>`);
    } else falha('Este documento não tem arquivo anexado.');
    return;
  }
  try{
    const {data,error} = await sb.storage.from('documents').createSignedUrl(d.storage_path, 300);
    if(error) throw error;
    if(ehHTML(d.storage_path)){
      const resp = await fetch(data.signedUrl);
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      const txt = await resp.text();
      const ifr = document.createElement('iframe');
      ifr.setAttribute('sandbox','allow-scripts allow-popups allow-forms allow-modals');
      ifr.setAttribute('referrerpolicy','no-referrer');
      ifr.srcdoc = txt;
      box.innerHTML=''; box.appendChild(ifr);
    }else{
      const ifr = document.createElement('iframe');
      ifr.src = data.signedUrl;
      box.innerHTML=''; box.appendChild(ifr);
    }
  }catch(e){
    falha('O arquivo não pôde ser lido aqui ('+((e&&e.message)||'erro')+').',
      `<button class="btn-p" onclick="abrirArquivoEmAba('${esc(String(id))}')">Abrir em nova aba</button>`);
  }
}
/* a tela de documentos ganha o modo "página do documento" */
const _mg8Docs = renderDocsView;
renderDocsView = function(){
  if(DVIEW.kind!=='doc') return _mg8Docs();
  const d = DOCS.find(x=>String(x.id)===String(DVIEW.id));
  const el = $('v-docs');
  if(!d){ DVIEW={kind:'home'}; return _mg8Docs() }
  const t = docTipo(d.tipo);
  el.innerHTML = `
    <div class="mg-crumb">
      <a onclick="dGo({kind:'home'})">Documentos</a><span>›</span>
      <a onclick="voltarDocs()">${esc(clientName(d.client_id))}</a><span>›</span>
      <b style="color:var(--text)">${esc(d.titulo||'Documento')}</b>
    </div>
    <div class="mg-doc-topo">
      ${mgClientLogo(d.client_id,44)}
      <div class="info">
        <h2>${esc(d.titulo||'(sem título)')}</h2>
        <div class="mg-doc-meta">
          <span class="tp" style="background:${hexA(t.hex,.14)};color:${t.hex}">${esc(t.label.replace(/s$/,''))}</span>
          <span>${esc(clientName(d.client_id))}</span><span>·</span>
          <span>publicado ${esc(docDate(d.created_at))}</span>
        </div>
      </div>
      <div class="mg-doc-acoes">
        <button class="btn-p" onclick="abrirArquivoEmAba('${esc(String(d.id))}')">Abrir arquivo</button>
        ${d.storage_path?`<button class="mini-btn ghost" onclick="baixarArquivo('${esc(String(d.id))}')">Baixar</button>`:''}
        <button class="mini-btn ghost" onclick="voltarDocs()">Voltar</button>
      </div>
    </div>
    <div class="mg-visor" id="mg-visor"><div class="carregando"><span class="mg-pontinhos">carregando o documento</span></div></div>`;
  carregarVisor(d.id);
};

/* ---------- 3. novos envios já guardam o tipo certo ---------- */
(function(){
  const _origUpload = sb.storage.from('documents').upload;
  /* o SDK cria um objeto novo a cada chamada; então envolvemos o método `from` */
  const _from = sb.storage.from.bind(sb.storage);
  sb.storage.from = function(bucket){
    const api = _from(bucket);
    if(bucket!=='documents') return api;
    const upOrig = api.upload.bind(api);
    api.upload = function(path, file, opts){
      const o = Object.assign({}, opts||{});
      if(!o.contentType){
        if(/\.html?$/i.test(path)) o.contentType='text/html;charset=utf-8';
        else if(file && file.type) o.contentType=file.type;
      }
      return upOrig(path, file, o);
    };
    return api;
  };
})();
</script>

/* a janela de editar ganha a seção de acessos */
const _mg9Abrir = abrirEditarCliente;
abrirEditarCliente = function(id){
  _mg9Abrir(id);
  const corpo = document.querySelector('#mg-edcli .mg-novocli');
  if(!corpo) return;
  let sec = document.getElementById('mg-acessos');
  if(!sec){
    sec = document.createElement('div');
    sec.className = 'mg-acessos'; sec.id = 'mg-acessos';
    /* entra antes da área de exclusão */
    const perigo = corpo.querySelector('.mg-perigo');
    corpo.insertBefore(sec, perigo || null);
  }
  sec.innerHTML = `
    <div class="cab">
      <h4>Quem acessa esta empresa</h4>
      <button class="mg-add-ac" onclick="mgMostrarNovoAcesso()"><span class="p">+</span>Adicionar acesso</button>
    </div>
    <div class="mg-lista-ac" id="mg-lista-ac"><div class="vazio">carregando…</div></div>
    <div id="mg-form-ac" class="mg-abre">
      <div class="mg-novocli" style="padding-top:4px">
        <div class="par">
          <div><div class="rot">Nome da pessoa</div><input type="text" id="ac2-nome" placeholder="ex.: Marina Costa"></div>
          <div><div class="rot">E-mail de acesso</div><input type="text" id="ac2-email" placeholder="marina@empresa.com.br" autocomplete="off"></div>
        </div>
        <div>
          <div class="rot">Senha</div>
          <div style="display:flex;gap:8px">
            <input type="text" id="ac2-senha" placeholder="mínimo 6 caracteres">
            <button class="mini-btn" onclick="document.getElementById('ac2-senha').value=mgSenhaForte()">Gerar</button>
          </div>
        </div>
        <div style="display:flex;gap:9px">
          <button class="btn-p" id="ac2-btn" onclick="criarAcessoParaCliente()">Criar acesso</button>
          <button class="mini-btn ghost" onclick="mgEsconderNovoAcesso()">Cancelar</button>
        </div>
        <div id="ac2-res"></div>
      </div>
    </div>`;
  carregarAcessosCliente(id);
};

function mgMostrarNovoAcesso(){
  const f = $('mg-form-ac'); if(!f) return;
  f.classList.add('on');
  if(!$('ac2-senha').value) $('ac2-senha').value = mgSenhaForte();
  setTimeout(()=>{ const n=$('ac2-nome'); if(n) n.focus() }, 260);
}
function mgEsconderNovoAcesso(){
  const f = $('mg-form-ac'); if(!f) return;
  f.classList.remove('on');
  ['ac2-nome','ac2-email','ac2-senha'].forEach(id=>{ const e=$(id); if(e) e.value='' });
  const r=$('ac2-res'); if(r) r.innerHTML='';
}

async function carregarAcessosCliente(id){
  const box = $('mg-lista-ac'); if(!box) return;
  try{
    const {data,error} = await sb.from('profiles').select('id,nome,role,client_id,email').eq('client_id', id);
    let lista = data;
    if(error){
      /* a coluna de e-mail pode não existir; tentamos sem ela */
      const r2 = await sb.from('profiles').select('id,nome,role,client_id').eq('client_id', id);
      if(r2.error) throw r2.error;
      lista = r2.data;
    }
    const pessoas = (lista||[]).filter(p=>p.role==='client');
    box.innerHTML = pessoas.length
      ? pessoas.map(p=>`<div class="p">
            <span class="av">${esc(initials(p.nome||'?'))}</span>
            <span class="nm">${esc(p.nome||'—')}</span>
            <span class="em">${esc(p.email||'')}</span>
          </div>`).join('')
      : `<div class="vazio">Ninguém tem acesso a esta empresa ainda.</div>`;
  }catch(e){
    box.innerHTML = `<div class="vazio">Não foi possível carregar (${esc((e&&e.message)||'erro')}).</div>`;
  }
}

async function criarAcessoParaCliente(){
  if(!EC_ID) return;
  const nome=($('ac2-nome').value||'').trim();
  const email=($('ac2-email').value||'').trim();
  const senha=($('ac2-senha').value||'');
  const res=$('ac2-res');
  const erro=m=>{ res.innerHTML=`<div class="mg-res err">⚠ ${esc(m)}</div>` };
  if(!nome) return erro('Informe o nome da pessoa.');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return erro('E-mail inválido.');
  if(senha.length<6) return erro('A senha precisa ter ao menos 6 caracteres.');

  const empresa = CLIENTS.find(c=>c.id===EC_ID);
  $('ac2-btn').disabled=true;
  res.innerHTML=`<div class="mg-res">⏳ Criando o acesso…</div>`;
  try{
    const {data,error} = await mgSb2().auth.signUp({
      email, password: senha,
      options:{ data:{ nome, role:'client', client_id: EC_ID } }
    });
    if(error) throw error;
    const uid = data && data.user ? data.user.id : null;

    let vinculo = {ok:false, motivo:'usuário não retornado'};
    if(uid){
      res.innerHTML=`<div class="mg-res">⏳ Amarrando o acesso à empresa…</div>`;
      vinculo = await mgVincularPerfil(uid, nome, EC_ID);
      /* guarda o e-mail junto do perfil, se o banco tiver essa coluna */
      try{ await sb.from('profiles').update({email}).eq('id',uid) }catch(_){}
    }
    const precisaConfirmar = data && data.user && !data.user.confirmed_at && !data.session;

    res.innerHTML = `<div class="mg-res ok">✓ <b>Acesso criado para ${esc(nome)}</b> em ${esc(empresa?empresa.nome:'')}.
      <div class="cred">Endereço: ${location.origin+location.pathname}<br>E-mail: ${esc(email)}<br>Senha: ${esc(senha)}</div>
      ${precisaConfirmar?`<div style="margin-top:8px">⚠ A confirmação de e-mail está <b>ligada</b> no Supabase — ${esc(nome)} precisa clicar no link recebido antes do primeiro login (Authentication → Providers → Email → desligue <b>Confirm email</b>).</div>`:''}
      ${vinculo.ok
        ? `<div style="margin-top:8px">✓ Perfil confirmado: vai enxergar somente os documentos desta empresa.</div>`
        : `<div style="margin-top:8px">⚠ O login foi criado, mas não consegui confirmar o vínculo (${esc(vinculo.motivo||'')}). Ajuste em Supabase → profiles: <b>role = client</b> e <b>client_id = ${esc(EC_ID)}</b>.</div>`}
      <div style="font-size:11.5px;color:var(--muted);margin-top:8px">Copie e envie por um canal seguro. A senha não fica guardada aqui.</div>
    </div>`;
    ['ac2-nome','ac2-email','ac2-senha'].forEach(id=>{ const e=$(id); if(e) e.value='' });
    carregarAcessosCliente(EC_ID);
    toast('Acesso criado ✓');
  }catch(e){
    const m=(e&&e.message)||'falha';
    if(/signups? not allowed|disabled/i.test(m))
      erro('O cadastro de usuários está desligado no Supabase (Authentication → Providers → Email → "Allow new users to sign up").');
    else if(/already registered|already exists/i.test(m))
      erro('Já existe um usuário com esse e-mail.');
    else erro('Não foi possível criar: '+m);
  }finally{ $('ac2-btn').disabled=false }
}

/* no cadastro de empresa nova, o e-mail também fica guardado no perfil */
const _mg9Criar = criarClienteCompleto;
criarClienteCompleto = async function(){
  const email = $('nc-email') ? ($('nc-email').value||'').trim() : '';
  await _mg9Criar();
  if(email){
    try{
      const {data} = await sb.from('profiles').select('id,client_id,role').order('id');
      /* grava o e-mail no perfil recém-criado, quando a coluna existir */
      const alvo = (data||[]).filter(p=>p.role==='client');
      const ultimo = alvo[alvo.length-1];
      if(ultimo) await sb.from('profiles').update({email}).eq('id',ultimo.id);
    }catch(_){}
  }
};
