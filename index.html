<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modesto Tasks — Gestão de Demandas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========= CONFIG DE CORES — padrão Modesto ========= */
:root{
  --ink:#1a1a18; --ink2:#131311; --panel:#211f1c; --panel2:#262420;
  --paper:#f8f5ef; --card:#ffffff; --card2:#f3efe6;
  --text:#23211d; --muted:#8a8271; --muted2:#a49d8f;
  --brass:#c2a15b; --brass2:#9a7b3c; --brass-soft:#d9be86;
  --line:rgba(26,26,24,.075); --line2:rgba(26,26,24,.13);
  --line-d:rgba(236,231,219,.10);
  --danger:#b84a3e;
  /* status (tons terrosos) */
  --st-todo:#7C8A97;  --st-day:#D98324;  --st-prog:#C79A1E;
  --st-done:#2E9E6B;  --st-block:#D95D39; --st-fin:#2E7D5B;
  --font-d:'Fraunces',Georgia,serif; --font-b:'Hanken Grotesk',system-ui,sans-serif;
  --r-card:12px; --zoom:1;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--paper);color:var(--text);min-height:100vh}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:rgba(26,26,24,.18);border-radius:8px}

/* ================= LOGIN ================= */
#login{display:grid;place-items:center;min-height:100vh;padding:24px;background:var(--ink);position:relative;overflow:hidden}
#login .bg{position:absolute;inset:0;z-index:0}
#login .bg svg{width:100%;height:100%;display:block}
#login::after{content:"";position:absolute;inset:0;z-index:1;background:radial-gradient(120% 90% at 50% 8%,transparent 55%,rgba(10,10,9,.55) 100%)}
.gline{stroke-dasharray:2600;stroke-dashoffset:2600;animation:draw 2.6s cubic-bezier(.22,.61,.36,1) .2s forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.auth{position:relative;z-index:2;width:100%;max-width:400px;background:rgba(33,31,28,.82);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line-d);border-radius:18px;padding:40px 36px 30px;box-shadow:0 30px 80px -30px rgba(0,0,0,.8)}
.auth .mark{font-family:var(--font-d);font-weight:600;font-size:30px;width:56px;height:56px;display:grid;place-items:center;
  color:var(--brass-soft);border:1px solid rgba(194,161,91,.4);border-radius:14px;margin-bottom:22px}
.auth h1{font-family:var(--font-d);font-weight:500;font-size:27px;letter-spacing:-.4px;color:#ece7db}
.auth .sub{color:#a49d8f;font-size:13.5px;margin:4px 0 8px}
.auth label{display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;font-weight:600;color:#a49d8f;margin:16px 0 7px}
.auth input{width:100%;background:var(--ink2);color:#ece7db;border:1px solid var(--line-d);border-radius:9px;padding:12px 13px;font-size:14px;font-family:inherit}
.auth input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(194,161,91,.16)}
.auth .btn{width:100%;margin-top:22px;padding:13px;border:0;border-radius:9px;background:var(--brass);color:var(--ink2);font-weight:600;font-size:14px}
.auth .btn:hover{background:var(--brass-soft)}
.auth .err{color:#e0796b;font-size:13px;margin-top:12px;min-height:16px}
.auth .foot{margin-top:20px;padding-top:16px;border-top:1px solid var(--line-d);font-size:11px;color:#a49d8f;letter-spacing:.5px;text-align:center;text-transform:uppercase}
.auth .cross{display:block;text-align:center;margin-top:16px;color:var(--brass);font-size:13px;text-decoration:none}
.auth .cross:hover{color:var(--brass-soft)}

/* ================= APP SHELL ================= */
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.side{width:236px;flex-shrink:0;background:var(--card);color:var(--text);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.side-brand .logo{font-family:var(--font-d);font-weight:600;width:34px;height:34px;display:grid;place-items:center;background:var(--brass);color:var(--ink2);border-radius:9px;font-size:18px}
.side-brand .nm{font-family:var(--font-d);font-size:16px;font-weight:500}
.side-brand .tag{font-size:10px;color:var(--muted);letter-spacing:.5px}
.side-nav{padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:500;background:none;border:0;text-align:left;width:100%;transition:background .18s ease,color .18s ease,transform .12s ease}
.nav-i:hover{background:var(--card2);color:var(--text)}
.nav-i.on{background:rgba(194,161,91,.16);color:var(--brass2)}
.nav-i .ic{width:18px;text-align:center;opacity:.9}
.side-user{padding:14px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.side-user .av{width:34px;height:34px;border-radius:50%;background:var(--brass);color:var(--ink2);display:grid;place-items:center;font-weight:700;font-size:14px;overflow:hidden}
.side-user .nm{font-size:13px;font-weight:600;line-height:1.2}
.side-user .role{font-size:10.5px;color:var(--muted)}
.side-user .out{margin-left:auto;background:none;border:0;color:var(--muted);font-size:12px;cursor:pointer}
.side-user .out:hover{color:var(--danger)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 26px;border-bottom:1px solid var(--line);background:var(--card)}
.topbar .title{font-family:var(--font-d);font-size:22px;font-weight:500;letter-spacing:-.3px}
.topbar .spacer{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;min-width:220px}
.search input{border:0;background:none;outline:none;font-size:13px;width:100%;font-family:inherit;color:var(--text)}
.tsel{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none}
.btn-p{background:var(--brass);color:var(--ink2);border:0;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600}
.btn-p{transition:background .15s ease,transform .1s ease}.btn-p:hover{background:var(--brass2);color:#fff}.btn-p:active{transform:scale(.96)}
.portal-link{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;font-size:13px;font-weight:600;
  color:var(--brass2);background:rgba(194,161,91,.12);border:1px solid rgba(194,161,91,.3);text-decoration:none}
.portal-link:hover{background:rgba(194,161,91,.22)}
.content{flex:1;padding:28px 30px;overflow:auto}
.view{display:none}.view.on{display:block}

/* ===== Dashboard ===== */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;transition:transform .18s ease,box-shadow .18s ease}.stat:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(26,26,24,.07)}
.stat .n{font-family:var(--font-d);font-size:30px;font-weight:600;line-height:1}
.stat .l{font-size:12px;color:var(--muted);margin-top:6px}
.stat .ic{float:right;font-size:16px;opacity:.5}
.dash-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:16px;margin-top:16px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:20px}
.panel h3{font-family:var(--font-d);font-size:16px;font-weight:500;margin-bottom:16px}
.donut-wrap{display:flex;align-items:center;gap:24px}
.legend{display:flex;flex-direction:column;gap:9px;font-size:13px}
.legend .row{display:flex;align-items:center;gap:8px}
.legend .dot{width:10px;height:10px;border-radius:3px}
.legend .v{margin-left:auto;font-weight:700;color:var(--text)}
.wl{display:flex;flex-direction:column;gap:12px}
.wl .r{display:grid;grid-template-columns:130px 1fr 40px;align-items:center;gap:12px;font-size:13px}
.wl .who{display:flex;align-items:center;gap:8px;min-width:0}
.wl .who .av{width:26px;height:26px;border-radius:50%;background:var(--brass);color:var(--ink2);display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0}
.wl .who span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl .bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden}
.wl .bar>i{display:block;height:100%;background:var(--brass);border-radius:6px}
.wl .cnt{text-align:right;font-weight:700}

/* ===== Board ===== */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:stretch;min-height:calc(100vh - 132px)}
.col{background:var(--card2);border:1px solid var(--line);border-radius:14px;width:288px;flex-shrink:0;display:flex;flex-direction:column;height:calc(100vh - 132px)}
.col{transition:background .2s ease,border-color .2s ease}
.col.dragover{background:rgba(194,161,91,.12);border-color:var(--brass);box-shadow:0 0 0 3px rgba(194,161,91,.25) inset}
.col.dragover .cards{outline:2px dashed var(--brass);outline-offset:-6px;border-radius:12px}
.col-h{display:flex;align-items:center;gap:8px;padding:13px 14px 11px;border-top:3px solid var(--muted);border-radius:12px 12px 0 0}
.col-h .t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.col-h .c{margin-left:auto;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:11px;font-weight:700;color:var(--muted)}
.cards{padding:0 10px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;flex:1;min-height:0}
.cards>*{flex-shrink:0}
.card-t{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--muted);border-radius:11px;padding:13px;cursor:pointer;transition:box-shadow .2s cubic-bezier(.22,.61,.36,1),transform .2s cubic-bezier(.22,.61,.36,1),border-color .2s;box-shadow:0 1px 2px rgba(26,26,24,.04)}
.card-t:hover{box-shadow:0 8px 22px rgba(26,26,24,.10);transform:translateY(-2px)}
.card-t.dragging{opacity:.35;transform:scale(.97) rotate(1.6deg);box-shadow:0 12px 30px rgba(26,26,24,.18)}
.card-t.just-moved{animation:landPop .55s cubic-bezier(.22,1.2,.36,1)}
@keyframes landPop{0%{transform:scale(.9);box-shadow:0 0 0 3px rgba(194,161,91,0)}40%{transform:scale(1.04);box-shadow:0 0 0 3px rgba(194,161,91,.5)}100%{transform:scale(1);box-shadow:0 0 0 3px rgba(194,161,91,0)}}
.card-t .tt{font-size:13.5px;font-weight:600;line-height:1.35;margin-bottom:9px}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:6px}
.addcard{margin:2px 10px 12px;background:none;border:1px dashed var(--line2);border-radius:9px;padding:9px;color:var(--muted);font-size:12.5px;font-weight:600}
.addcard:hover{border-color:var(--brass);color:var(--brass2);background:rgba(194,161,91,.06)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge .d{width:6px;height:6px;border-radius:50%}
.prio{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.4px}
.prio.Alta{background:#f6e0d8;color:#9c3d2f}.prio.Média{background:#f3ecd4;color:#8a6a1e}.prio.Baixa{background:#e6ecdd;color:#5a6b3e}
.cbadge{padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;background:rgba(194,161,91,.14);color:var(--brass2)}
.due{font-size:10.5px;color:var(--muted)}.due.over{color:var(--danger);font-weight:700}
.avs{display:flex}.avs .av{width:22px;height:22px;border-radius:50%;background:var(--brass);color:var(--ink2);display:grid;place-items:center;font-size:9.5px;font-weight:700;border:2px solid var(--card);margin-left:-6px}
.avs .av:first-child{margin-left:0}
.tchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--muted);background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.tchip.run{color:var(--danger);background:rgba(184,74,62,.08);border-color:rgba(184,74,62,.25)}
.tchip .p{font-size:10px}

/* ===== List ===== */
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:12px 15px;border-bottom:1px solid var(--line);font-size:13.5px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;background:var(--card2)}
tbody tr{cursor:pointer}tbody tr:hover{background:var(--card2)}
tbody tr:last-child td{border-bottom:0}

/* ===== Calendar ===== */
.cal{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.cal-h{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-h .m{font-family:var(--font-d);font-size:18px;font-weight:500;text-transform:capitalize}
.cal-nav{background:var(--card2);border:1px solid var(--line);border-radius:8px;width:32px;height:32px;font-size:15px}
.cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.cleg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.cdot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dh{font-size:11px;font-weight:700;color:var(--muted);text-align:center;padding:4px;text-transform:uppercase}
.cal-d{min-height:88px;border:1px solid var(--line);border-radius:8px;padding:6px;background:var(--card2)}
.cal-d.out{opacity:.4}
.cal-d .dn{font-size:12px;font-weight:600;color:var(--muted)}
.cal-d.today .dn{color:var(--brass2)}
.cal-ev{font-size:10.5px;font-weight:600;border-radius:5px;padding:2px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}

/* ===== Slide-over detalhe ===== */
.overlay{position:fixed;inset:0;background:rgba(20,19,17,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:auto}
.slide{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%) scale(.92);width:min(640px,94vw);max-height:92vh;background:var(--paper);z-index:51;opacity:0;pointer-events:none;
  transition:transform .3s cubic-bezier(.22,1.25,.36,1),opacity .22s;display:flex;flex-direction:column;border-radius:20px;overflow:hidden;box-shadow:0 40px 110px -24px rgba(0,0,0,.55)}
.slide.on{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.slide-h{display:flex;align-items:flex-start;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line);background:var(--card)}
.slide-h .st-line{flex:1}
.slide-h h2{font-family:var(--font-d);font-size:20px;font-weight:500;line-height:1.25}
.slide-h .x{background:var(--card2);border:1px solid var(--line);border-radius:8px;width:34px;height:34px;font-size:16px;flex-shrink:0}
.slide-b{flex:1;overflow:auto;padding:20px 22px;min-height:0}
.frow{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.frow .fl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.fld{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;font-family:inherit;color:var(--text)}
.fld:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(194,161,91,.14)}
textarea.fld{min-height:80px;resize:vertical}
.timebox{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px;margin:16px 0}
.timebox .tl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.timebox .tv{font-family:var(--font-d);font-size:24px;font-weight:600;line-height:1}
.timer-btn{margin-left:auto;display:inline-flex;align-items:center;gap:7px;border:0;border-radius:9px;padding:11px 18px;font-size:13px;font-weight:600;background:var(--brass);color:#fff}
.timer-btn:hover{background:var(--brass2)}
.timer-btn.run{background:var(--danger)}
.timer-btn .d{width:8px;height:8px;border-radius:50%;background:currentColor}
.timer-btn.run .d{animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.sect-t{font-family:var(--font-d);font-size:15px;font-weight:500;margin:22px 0 12px;display:flex;align-items:center;gap:8px}
.notes{display:flex;flex-direction:column;gap:12px}
.note{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.note .nh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.note .nav{width:26px;height:26px;border-radius:50%;background:var(--brass);color:var(--ink2);display:grid;place-items:center;font-size:11px;font-weight:700}
.note .nn{font-size:13px;font-weight:600}.note .nt{font-size:11px;color:var(--muted);margin-left:auto}
.note .nb{font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.note .del{background:none;border:0;color:var(--muted);font-size:11px;margin-left:6px}
.note-form{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.note-form textarea{min-height:64px}
.note-form .btn{align-self:flex-end;background:var(--brass);color:var(--ink2);border:0;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600}
.slide-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;background:var(--card)}
.slide-foot .btn-save{background:var(--brass);color:var(--ink2);border:0;border-radius:9px;padding:11px 20px;font-weight:600;font-size:14px}
.slide-foot .btn-save:hover{background:var(--brass2);color:#fff}
.slide-foot .btn-del{margin-left:auto;background:none;border:1px solid var(--line2);color:var(--danger);border-radius:9px;padding:11px 16px;font-size:13px}

/* modal simples */
.modal{position:fixed;inset:0;background:rgba(20,19,17,.5);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-c{background:var(--paper);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:26px}
.modal-c h2{font-family:var(--font-d);font-size:20px;font-weight:500;margin-bottom:6px}
.modal-c label{display:block;font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin:14px 0 6px}
.modal-actions{display:flex;gap:10px;margin-top:22px}
.modal-actions .btn-save{background:var(--brass);color:var(--ink2);border:0;border-radius:9px;padding:11px 20px;font-weight:600}
.modal-actions .btn-x{background:none;border:1px solid var(--line2);border-radius:9px;padding:11px 18px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#ece7db;
  padding:12px 20px;border-radius:10px;font-size:13.5px;z-index:100;opacity:0;transition:.25s;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}

/* comemoração ao concluir */
.celebrate{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.rocket{position:fixed;bottom:-60px;animation:rocketFly 2s ease-out forwards;will-change:transform}
@keyframes rocketFly{0%{transform:translateY(0) translateX(0) rotate(-40deg);opacity:0}12%{opacity:1}100%{transform:translateY(-118vh) translateX(var(--dx,0)) rotate(-40deg);opacity:0}}
.confetti{position:fixed;top:-18px;width:9px;height:15px;border-radius:2px;animation:confFall 1.8s linear forwards;will-change:transform}
@keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(760deg);opacity:0}}
/* transição fluida ao trocar de aba */
.view.on{animation:viewIn .34s cubic-bezier(.22,.61,.36,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.nav-i{transition:background .15s ease,color .15s ease}
@media (prefers-reduced-motion:reduce){.gline{animation:none;stroke-dashoffset:0}.timer-btn.run .d{animation:none}.rocket,.confetti{display:none}.view.on{animation:none}}
@media(max-width:720px){.side{position:fixed;z-index:40;transform:translateX(-100%);transition:.2s}.side.open{transform:none}}
/* ====== ajustes controláveis por Configurações ====== */
.card-t,.stat,.panel{border-radius:var(--r-card)}
.col{border-radius:calc(var(--r-card) + 2px)}
.content{zoom:var(--zoom)}

/* ====== TEMA ESCURO ====== */
body.theme-dark{
  --paper:#16150f; --card:#201e1a; --card2:#1a1915; --card3:#262420;
  --text:#ece7db; --muted:#9a9082; --muted2:#7a7264;
  --line:rgba(236,231,219,.09); --line2:rgba(236,231,219,.15);
}
body.theme-dark .search input,body.theme-dark input,body.theme-dark select,body.theme-dark textarea{background:#14130f;color:var(--text)}
body.theme-dark .stat,body.theme-dark .panel,body.theme-dark .card-t,body.theme-dark .col-h{background:var(--card)}
body.theme-dark .col{background:var(--card2)}
body.theme-dark table{background:var(--card)}
body.theme-dark th{background:var(--card2)}
body.theme-dark .slide,body.theme-dark .modal-c{background:var(--paper)}
body.theme-dark .side{background:var(--card)}

/* ====== animação dourada contínua na barra lateral ====== */
.side-flow{height:56px;position:relative;overflow:hidden;margin:0 0 2px;flex-shrink:0}
.side-flow svg{position:absolute;inset:0;width:100%;height:100%}
.side-flow .fline{stroke-dasharray:340;animation:flow 3.4s linear infinite}
@keyframes flow{to{stroke-dashoffset:-680}}

/* ====== "hoje" na lateral ====== */
.side-today{margin:6px 12px 4px;background:rgba(194,161,91,.12);border:1px solid rgba(194,161,91,.28);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.side-today:hover{background:rgba(194,161,91,.2)}
.side-today .big{font-family:var(--font-d);font-size:22px;font-weight:600;color:var(--brass2);line-height:1}
.side-today .lbl{font-size:11px;color:var(--muted);line-height:1.2}

/* ====== avatar com foto ====== */
.side-user .av img,.note .nav img,.wl .who .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ====== % por cliente ====== */
.cliprog{display:flex;flex-direction:column;gap:12px}
.cliprog .r{display:grid;grid-template-columns:150px 1fr 46px;align-items:center;gap:12px;font-size:13px}
.cliprog .who{display:flex;align-items:center;gap:8px;min-width:0}
.cliprog .who .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.cliprog .who span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cliprog .bar{height:9px;background:var(--card2);border-radius:6px;overflow:hidden}
.cliprog .bar>i{display:block;height:100%;border-radius:6px}
.cliprog .pct{text-align:right;font-weight:700}

/* ====== telas Config / Clientes / Equipe ====== */
.set-sec{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:20px;margin-bottom:16px;max-width:720px}
.set-sec h3{font-family:var(--font-d);font-size:16px;font-weight:500;margin-bottom:6px}
.set-sec .desc{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:3px}
.seg button{border:0;background:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
.seg button.on{background:var(--brass);color:#fff}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:0}
.set-row .k{font-size:13.5px;font-weight:600}
.set-row .k small{display:block;font-weight:400;color:var(--muted);font-size:11.5px}
.mini-btn{background:var(--brass);color:#fff;border:0;border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer}
.mini-btn:hover{background:var(--brass2)}
.mini-btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--text)}
.clist{width:100%;max-width:720px}
.crow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:12px 14px;margin-bottom:8px}
.crow .sw{width:16px;height:16px;border-radius:4px;flex-shrink:0}
.crow .nm{font-weight:600;font-size:14px;flex:1}
.crow .rl{font-size:11px;color:var(--muted)}
.avatar-pick{width:60px;height:60px;border-radius:50%;background:var(--brass);color:var(--ink2);display:grid;place-items:center;font-weight:700;font-size:22px;overflow:hidden;cursor:pointer;flex-shrink:0}
.avatar-pick img{width:100%;height:100%;object-fit:cover}

/* ====== TUTORIAL ANIMADO (tela cheia) ====== */
.tour-ov{position:fixed;inset:0;z-index:120;display:none;background:#1a1a18;overflow:hidden}
.tour-ov.on{display:block}
.tour-scene{position:absolute;inset:0;z-index:0;opacity:.6}
.tour-scene .gline2{stroke-dasharray:2600;stroke-dashoffset:2600;animation:draw 3s ease forwards}
.tour-card{position:relative;z-index:2;height:100%;display:flex;flex-direction:column}
.tour-top{display:flex;align-items:center;gap:14px;padding:22px 30px}
.tour-brand{display:flex;align-items:center;gap:10px;color:#ece7db;font-family:var(--font-d);font-size:17px;font-weight:500}
.tour-brand .m{width:34px;height:34px;border-radius:9px;background:var(--brass);color:#1a1a18;display:grid;place-items:center;font-weight:600;font-size:18px}
.tour-brand small{display:block;font-size:9px;letter-spacing:.5px;color:#a49d8f;font-family:var(--font-b)}
.tour-seg{display:flex;gap:8px;margin:0 auto}
.tour-seg i{width:36px;height:5px;border-radius:5px;background:rgba(236,231,219,.16);transition:background .3s}
.tour-seg i.on{background:var(--brass)}
.tour-x{background:rgba(236,231,219,.08);border:0;color:#ece7db;width:36px;height:36px;border-radius:9px;font-size:16px;cursor:pointer}
.tour-x:hover{background:rgba(236,231,219,.16)}
.tour-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px 24px 0;gap:20px;min-height:0}
.tour-illus{height:clamp(180px,34vh,300px);display:flex;align-items:center;justify-content:center;position:relative;width:100%}
.tour-h{font-family:var(--font-d);font-size:clamp(26px,3.4vw,36px);font-weight:500;color:#ece7db;max-width:680px;line-height:1.2}
.tour-h b{color:var(--brass-soft)}
.tour-p{font-size:clamp(14px,1.6vw,16.5px);color:#a49d8f;max-width:540px;line-height:1.6}
.tour-bot{display:flex;align-items:center;justify-content:center;gap:12px;padding:26px}
.tour-btn{border:0;border-radius:11px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s,background .15s}
.tour-btn:active{transform:scale(.96)}
.tour-next{background:var(--brass);color:#1a1a18}
.tour-next:hover{background:var(--brass-soft)}
.tour-skip{background:transparent;color:#a49d8f}
.tour-back{background:rgba(236,231,219,.08);color:#ece7db}
.tour-mid>.tour-h,.tour-mid>.tour-p,.tour-mid>.tour-illus{animation:tourIn .55s cubic-bezier(.22,.61,.36,1) both}
.tour-mid>.tour-p{animation-delay:.08s}
.tour-mid>.tour-h{animation-delay:.04s}
@keyframes tourIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ---- ilustrações do tutorial ---- */
.ti-wordmark{font-family:var(--font-d);font-size:120px;font-weight:600;color:var(--brass);animation:tiPop 1s cubic-bezier(.22,1.3,.36,1)}
@keyframes tiPop{0%{opacity:0;transform:scale(.4) rotate(-12deg)}100%{opacity:1;transform:none}}
.ti-ring{position:absolute;width:220px;height:220px;border:2px dashed rgba(194,161,91,.4);border-radius:50%;animation:tiSpin 14s linear infinite}
@keyframes tiSpin{to{transform:rotate(360deg)}}
.ti-board{display:flex;gap:14px;position:relative}
.ti-col{width:120px;background:rgba(236,231,219,.05);border:1px solid rgba(236,231,219,.1);border-radius:11px;padding:9px;min-height:170px}
.ti-col .h{font-size:9px;color:#a49d8f;margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}
.ti-c{background:#2a2824;border-left:3px solid var(--brass);border-radius:7px;padding:9px 8px;font-size:9.5px;color:#d9d3c6;margin-bottom:6px;text-align:left}
.ti-fly{position:absolute;top:34px;left:9px;width:104px;animation:tiFly 3.4s ease-in-out infinite}
@keyframes tiFly{0%,12%{transform:translateX(0) rotate(0);opacity:1}45%,60%{transform:translateX(268px) rotate(3deg)}92%,100%{transform:translateX(0)}}
.ti-timer{background:#262420;border:1px solid rgba(236,231,219,.12);border-radius:14px;padding:22px 26px;min-width:260px}
.ti-timer .row{display:flex;align-items:center;justify-content:space-between;gap:14px}
.ti-timer .tv{font-family:var(--font-d);font-size:30px;color:#ece7db}
.ti-timer .btn{background:var(--brass);color:#1a1a18;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.ti-timer .dot{width:8px;height:8px;border-radius:50%;background:#1a1a18;animation:tiBlink 1.1s infinite}
.ti-timer .bar{height:6px;background:rgba(236,231,219,.1);border-radius:6px;margin-top:16px;overflow:hidden}
.ti-timer .bar>i{display:block;height:100%;background:var(--brass);width:0;animation:tiFill 3s ease-in-out infinite}
@keyframes tiBlink{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes tiFill{0%{width:6%}100%{width:92%}}
.ti-notes{display:flex;flex-direction:column;gap:12px;width:320px}
.ti-note{background:#262420;border:1px solid rgba(236,231,219,.1);border-radius:12px;padding:12px 14px;text-align:left;opacity:0;animation:tiSlide .6s ease forwards}
.ti-note:nth-child(2){animation-delay:.5s}
.ti-note .who{font-size:10px;color:var(--brass-soft);font-weight:700;margin-bottom:4px;display:flex;gap:6px;align-items:center}
.ti-note .bd{font-size:11.5px;color:#d9d3c6}
.ti-tag{font-size:8px;font-weight:700;padding:1px 6px;border-radius:10px}
.ti-tag.pub{background:rgba(46,158,107,.2);color:#7fd4a8}
.ti-tag.pri{background:rgba(236,231,219,.1);color:#a49d8f}
@keyframes tiSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
.ti-dash{display:flex;align-items:center;gap:34px}
.ti-donut circle.fg{stroke-dasharray:327;stroke-dashoffset:327;animation:tiDonut 1.4s ease forwards .2s}
@keyframes tiDonut{to{stroke-dashoffset:82}}
.ti-bars{display:flex;flex-direction:column;gap:11px}
.ti-bar{width:200px;height:9px;background:rgba(236,231,219,.1);border-radius:6px;overflow:hidden}
.ti-bar>i{display:block;height:100%;background:var(--brass);width:0;animation:tiGrow 1s ease forwards}
.ti-bar:nth-child(2)>i{animation-delay:.15s;background:#2e9e6b}
.ti-bar:nth-child(3)>i{animation-delay:.3s;background:#2d6fcf}
@keyframes tiGrow{to{width:var(--w,70%)}}
.ti-colors{display:flex;gap:14px}
.ti-colors span{width:44px;height:44px;border-radius:12px;transform:scale(0);animation:tiPopc .5s cubic-bezier(.22,1.4,.36,1) forwards}
.ti-colors span:nth-child(2){animation-delay:.1s}.ti-colors span:nth-child(3){animation-delay:.2s}
.ti-colors span:nth-child(4){animation-delay:.3s}.ti-colors span:nth-child(5){animation-delay:.4s}
@keyframes tiPopc{to{transform:scale(1)}}
.ti-toggle{width:150px;height:70px;border-radius:40px;background:linear-gradient(90deg,#e9e3d6,#2a2824);position:relative;animation:tiTheme 3s ease-in-out infinite}
.ti-toggle .knob{position:absolute;top:8px;left:8px;width:54px;height:54px;border-radius:50%;background:var(--brass);animation:tiKnob 3s ease-in-out infinite;display:grid;place-items:center;font-size:22px}
@keyframes tiKnob{0%,20%{left:8px}55%,75%{left:88px}100%{left:8px}}
@keyframes tiTheme{0%,20%{filter:none}55%,75%{filter:brightness(.8)}100%{filter:none}}

/* ---- ripple / animação de clique ---- */
button,.nav-i,.asg-chip,.acc,.tchip,.timer-btn,.mini-btn,.cbadge,.seg>button,.tour-btn,.card-t,.stat,.crow{position:relative;overflow:hidden}
.ripple-el{position:absolute;border-radius:50%;background:rgba(194,161,91,.45);transform:scale(0);animation:rippleAnim .6s ease-out;pointer-events:none;z-index:5}
@keyframes rippleAnim{to{transform:scale(2.6);opacity:0}}

/* ====== card entrando (fluidez extra) ====== */

.asg-wrap{display:flex;flex-wrap:wrap;gap:6px}
.asg-chip{display:inline-flex;align-items:center;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:20px;cursor:pointer;background:var(--card2);border:1px solid var(--line);color:var(--muted);transition:all .12s ease}
.asg-chip:hover{border-color:var(--brass)}
.asg-chip.on{background:var(--brass);color:#fff;border-color:var(--brass)}
.asg-chip.add{border-style:dashed;color:var(--brass2)}
.note-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:2px}
.note-badge.pub{background:rgba(46,158,107,.14);color:#2e7d5b}
.note-badge.priv{background:rgba(26,26,24,.07);color:var(--muted)}
.clogo{width:34px;height:34px;border-radius:6px;overflow:hidden;cursor:pointer;flex-shrink:0;display:block;border:1px solid var(--line)}
.clogo img{width:100%;height:100%;object-fit:contain;background:#fff}

/* fundo animado com MGP */
.bg-anim{position:fixed;inset:0;z-index:-1;pointer-events:none}
.bg-anim svg{width:100%;height:100%;display:block}
.bg-line{stroke-dasharray:420;animation:bgflow 5s linear infinite}
.bg-line2{stroke-dasharray:300;animation:bgflow2 7s linear infinite}
@keyframes bgflow{to{stroke-dashoffset:-840}}
@keyframes bgflow2{to{stroke-dashoffset:600}}
.bg-marks{animation:bgdrift 22s ease-in-out infinite alternate}
@keyframes bgdrift{0%{transform:translate(0,0)}100%{transform:translate(-24px,-40px)}}
.bg-marks text{animation:bgpulse 6s ease-in-out infinite}
.bg-marks text:nth-child(2){animation-delay:1.5s}
.bg-marks text:nth-child(3){animation-delay:3s}
.bg-marks text:nth-child(4){animation-delay:4.5s}
@keyframes bgpulse{0%,100%{opacity:.045}50%{opacity:.09}}
.bg-dot{animation:bgrise linear infinite}
@keyframes bgrise{0%{transform:translateY(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-320px);opacity:0}}
body.theme-dark .bg-anim .bg-marks text{opacity:.08!important}
body.no-bg .bg-anim{display:none}

/* densidade compacta */
body.density-compact .content{padding:16px 20px}
body.density-compact .card-t{padding:9px 11px}
body.density-compact .frow{padding:7px 0}

/* esconder avatares nos cards */
body.hide-card-av .card-t .avs{display:none}

/* faixa colorida no topo do card (estilo Trello) */
.card-strip{height:5px;border-radius:6px;margin:-13px -13px 11px}

/* subtarefas / checklist */
.subs{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.sub{display:flex;align-items:center;gap:9px;font-size:13.5px}
.sub input[type=checkbox]{width:16px;height:16px;accent-color:var(--brass);cursor:pointer;flex-shrink:0}
.sub.done .st{text-decoration:line-through;color:var(--muted)}
.sub .st{flex:1}
.sub .dl{color:var(--muted);cursor:pointer;font-size:12px;opacity:.4}
.sub:hover .dl{opacity:1}
.sub-add{display:flex;gap:8px;margin-top:10px}
.sub-prog{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.sub-prog.full{color:#2e7d5b;background:rgba(46,158,107,.12);border-color:rgba(46,158,107,.3)}
/* swatches de cor de destaque */
.acc-row{display:flex;gap:8px}
.acc{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.acc.on{border-color:var(--text)}

/* botões de ícone (sino/filtros) */
.icon-btn{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.icon-btn:hover{border-color:var(--brass)}
.notif-badge,.filter-count{color:#fff;border-radius:20px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:inline-grid;place-items:center;padding:0 4px}
.notif-badge{background:var(--danger)}
.filter-count{background:var(--brass)}
/* painéis suspensos */
.drop-panel{position:fixed;top:64px;right:26px;width:340px;max-height:78vh;overflow:auto;background:var(--card);border:1px solid var(--line2);border-radius:14px;box-shadow:0 24px 60px -20px rgba(0,0,0,.35);z-index:70;display:none}
.drop-panel.on{display:block;animation:dropIn .18s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.dp-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);font-family:var(--font-d);font-size:16px;font-weight:500}
.dp-head button{background:none;border:0;font-size:16px;color:var(--muted);cursor:pointer}
.dp-body{padding:6px 18px 18px}
.dp-lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:12px 0 6px}
.dp-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 0 6px;padding-top:14px;border-top:1px solid var(--line)}
.chk{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px;cursor:pointer}
.chk input{width:16px;height:16px;accent-color:var(--brass)}
/* notificações */
.nlist{display:flex;flex-direction:column}
.nitem{display:flex;gap:11px;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer}
.nitem:hover{background:var(--card2)}
.nitem.unread{background:rgba(194,161,91,.07)}
.nitem .nic{width:36px;height:36px;border-radius:10px;background:var(--card2);display:grid;place-items:center;font-size:17px;flex-shrink:0}
.nitem .ntx{font-size:13px;line-height:1.4;flex:1}
.nitem .ntm{font-size:11px;color:var(--muted);margin-top:3px}
.nitem .udot{width:8px;height:8px;border-radius:50%;background:var(--brass);flex-shrink:0;margin-top:7px}
.n-empty{text-align:center;padding:44px 20px;color:var(--muted);font-size:13.5px}
.card-desc{font-size:11.5px;color:var(--muted);line-height:1.45;margin:6px 0 2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-est{font-size:10.5px;color:var(--brass2);font-weight:600;margin:5px 0 2px}
/* tour de funcionalidades (coach marks) */
.coach-ov{position:fixed;inset:0;z-index:130;display:none;background:transparent}
.coach-ov.on{display:block}
.coach-hole{position:absolute;border-radius:12px;box-shadow:0 0 0 9999px rgba(20,19,17,.72);border:2px solid var(--brass);pointer-events:none;transition:all .32s cubic-bezier(.22,.61,.36,1)}
.coach-tip{position:absolute;width:300px;background:var(--paper);border-radius:14px;padding:18px;box-shadow:0 22px 55px -15px rgba(0,0,0,.55);z-index:131;transition:top .32s cubic-bezier(.22,.61,.36,1),left .32s cubic-bezier(.22,.61,.36,1);animation:tipPop .3s ease}
@keyframes tipPop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.coach-tip h4{font-family:var(--font-d);font-size:16px;font-weight:500;margin-bottom:6px}
.coach-tip p{font-size:13px;color:var(--muted);line-height:1.55}
.coach-tip .cnav{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.coach-tip .cstep{font-size:11px;color:var(--muted);font-weight:600}
.coach-tip .cbtns{display:flex;gap:8px}
.coach-tip button{border:0;border-radius:8px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer}
.coach-next{background:var(--brass);color:#1a1a18}

.coach-skip{background:transparent;color:var(--muted)}

<script>
/* =====================================================================
   CONFIG — cole aqui a URL e a chave anon do seu Supabase (mesmo do Portal)
   Chave anon é pública (pode ficar no código). Nunca use a service_role aqui.
   ===================================================================== */
const SUPABASE_URL  = 'https://eeqaabwsheaiwyhujcqj.supabase.co';
const SUPABASE_ANON = 'sb_publishable_AIjaigmy_i-aKNV1zkC8NQ_3-ZmQLfi';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ===== estado ===== */
let ME = null;                 // { id, email, name, role, client_id }
let CLIENTS = [];              // [{id, nome}]
let TASKS = [];                // linhas de tasks (já filtradas por RLS)
let VIEW = 'dashboard';
let DETAIL_ID = null;
let calRef = new Date();

/* ===== colunas / status ===== */
const COLS = [
  {key:'Não iniciado',         label:'Não iniciado',         color:'var(--st-todo)'},
  {key:'Entregas do dia',      label:'Entregas do dia',      color:'var(--st-day)'},
  {key:'Em Andamento',         label:'Em andamento',         color:'var(--st-prog)'},
  {key:'Impeditivo/Aprovação', label:'Impeditivo/Aprovação', color:'var(--st-block)'},
  {key:'Feito',                label:'Feito',                color:'var(--st-done)'},
  {key:'Concluído Atendimento',label:'Concluído',            color:'var(--st-fin)'},
];
const CLIENT_COLS = [
  {key:'Não iniciado',            label:'Não iniciado',            color:'var(--st-todo)'},
  {key:'Em andamento',            label:'Em andamento',            color:'var(--st-prog)'},
  {key:'Impeditivo/Em aprovação', label:'Impeditivo / Em aprovação',color:'var(--st-block)'},
  {key:'Concluído',               label:'Concluído',               color:'var(--st-fin)'},
];
const DONE_STATUSES = ['Feito','Concluído Atendimento'];
function clientStatus(s){
  if(['Entregas do dia','Em Andamento','Recorrente'].includes(s)) return 'Em andamento';
  if(['Impeditivo/Aprovação','Ag. Cliente'].includes(s)) return 'Impeditivo/Em aprovação';
  if(DONE_STATUSES.includes(s)) return 'Concluído';
  return 'Não iniciado';
}
const colColor = k => (COLS.find(c=>c.key===k)||{}).color || 'var(--muted)';

/* ===== helpers ===== */
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function initials(n){return (n||'?').trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase()}
function isAdmin(){return ME && ME.role==='admin'}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200)}

function celebrate(){
  const wrap=document.createElement('div');wrap.className='celebrate';document.body.appendChild(wrap);
  const icons=['🚀','🎉','✨','🎊','⭐','🥳'];
  for(let i=0;i<20;i++){
    const el=document.createElement('span');el.className='rocket';
    el.textContent=icons[Math.floor(Math.random()*icons.length)];
    el.style.left=(Math.random()*100)+'vw';
    el.style.fontSize=(20+Math.random()*28)+'px';
    el.style.setProperty('--dx',(Math.random()*220-110)+'px');
    el.style.animationDelay=(Math.random()*0.5)+'s';
    el.style.animationDuration=(1.6+Math.random()*0.9)+'s';
    wrap.appendChild(el);
  }
  const colors=['#c2a15b','#d9be86','#7a8a5a','#c57b3c','#5e6b44','#ece7db'];
  for(let i=0;i<55;i++){
    const c=document.createElement('span');c.className='confetti';
    c.style.left=(Math.random()*100)+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay=(Math.random()*0.5)+'s';
    c.style.animationDuration=(1.4+Math.random()*1.3)+'s';
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.remove(),3200);
}
function clientName(id){const c=CLIENTS.find(x=>x.id===id);return c?c.nome:'—'}
const CLIENT_PALETTE=['#D9531E','#1F9E5A','#2D6FCF','#8E3FBE','#E0A200','#12A38F','#D01F45','#5E8A00','#3949C0','#C25A00','#0E8FA8','#B5306E'];
let CLIENT_COLOR={};
function buildClientColors(){CLIENT_COLOR={};CLIENTS.forEach((c,i)=>{CLIENT_COLOR[c.id]=CLIENT_PALETTE[i%CLIENT_PALETTE.length];});}
function clientColor(id){return CLIENT_COLOR[id]||'#8a8271';}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function clientLogo(id){const c=CLIENTS.find(x=>x.id===id);return c&&c.logo_url?c.logo_url:null;}
function clientChipHTML(id,big){const lg=clientLogo(id),col=clientColor(id),nm=clientName(id);
  const badge=lg?`<img src="${lg}" style="width:${big?26:16}px;height:${big?26:16}px;border-radius:5px;object-fit:contain;background:#fff;border:1px solid var(--line)">`
                :`<span style="width:${big?14:11}px;height:${big?14:11}px;border-radius:3px;background:${col};display:inline-block"></span>`;
  return `<span style="display:inline-flex;align-items:center;gap:8px">${badge}<span>${esc(nm)}</span></span>`;}
/* seletor de responsáveis (múltiplos) */
function assigneePickerHTML(){
  const chips=ASSIGNEE_OPTS.map(n=>{const on=_selAssignees.some(x=>x.toLowerCase()===n.toLowerCase());
    return `<span class="asg-chip ${on?'on':''}" onclick="toggleAssignee('${n.replace(/'/g,"\\'")}')">${on?'✓ ':''}${esc(n)}</span>`;}).join('');
  return `<div class="asg-wrap">${chips}<span class="asg-chip add" onclick="addCustomAssignee()">+ outro</span></div>`;
}
function toggleAssignee(n){const i=_selAssignees.findIndex(x=>x.toLowerCase()===n.toLowerCase());
  if(i>=0)_selAssignees.splice(i,1);else _selAssignees.push(n);
  const el=$('asg-pick');if(el)el.innerHTML=assigneePickerHTML();}
function addCustomAssignee(){const n=prompt('Nome do responsável:');if(n&&n.trim()){const v=n.trim();
  if(!_selAssignees.some(x=>x.toLowerCase()===v.toLowerCase()))_selAssignees.push(v);
  if(!ASSIGNEE_OPTS.some(x=>x.toLowerCase()===v.toLowerCase()))ASSIGNEE_OPTS.push(v);
  const el=$('asg-pick');if(el)el.innerHTML=assigneePickerHTML();}}
/* estimativa automática de tempo por semelhança de título */
const STOP=new Set('de da do das dos para por com no na nos nas em ao dos que uma um the of and to in for'.split(' '));
function tokz(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOP.has(w));}
function overlapT(aSet,bArr){const b=new Set(bArr);if(!aSet.size||!b.size)return 0;let i=0;aSet.forEach(w=>{if(b.has(w))i++;});return i/Math.min(aSet.size,b.size);}
function estimateFor(t){const aw=new Set(tokz(t.title));if(!aw.size)return null;
  const sc=TASKS.filter(x=>x.id!==t.id&&(x.time_spent||0)>=60).map(x=>({x,s:overlapT(aw,tokz(x.title))})).filter(o=>o.s>=0.34).sort((a,b)=>b.s-a.s).slice(0,8);
  if(sc.length<2)return null;
  return {sec:sc.reduce((a,o)=>a+(o.x.time_spent||0),0)/sc.length,n:sc.length};}
function fmtDur(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;if(h)return h+'h '+String(m).padStart(2,'0')+'m';if(m)return m+'m '+String(s).padStart(2,'0')+'s';return s+'s'}
function taskElapsed(t){let b=t.time_spent||0;if(t.timer_start)b+=(Date.now()-new Date(t.timer_start).getTime())/1000;return b}
function todayISO(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return '';const[y,m,day]=d.split('-');return `${day}/${m}/${y}`}
function isOverdue(d,status){if(!d)return false;if(DONE_STATUSES.includes(status)||clientStatus(status)==='Concluído')return false;return new Date(d) < new Date(todayISO())}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d}

/* =====================================================================
   AUTH
   ===================================================================== */
async function signIn(){
  const email=$('li-email').value.trim(), pass=$('li-pass').value;
  $('li-err').textContent='';
  if(!email||!pass){$('li-err').textContent='Preencha e-mail e senha.';return}
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){$('li-err').textContent='E-mail ou senha inválidos.';return}
  await boot();
}
async function signOut(){await sb.auth.signOut();location.reload()}

async function loadProfile(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user)return null;
  const {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  return {id:user.id,email:user.email,name:(p&&p.nome)||user.email.split('@')[0],role:(p&&p.role)||'client',client_id:p?p.client_id:null,avatar_url:p?p.avatar_url:null};
}

async function boot(){
  ME = await loadProfile();
  if(!ME){$('login').style.display='grid';return}
  $('login').style.display='none';
  $('app').style.display='block';
  setMeAvatar();
  MYCHK=(ME.checklist&&ME.checklist.items)?ME.checklist:{items:[],notes:''};
  $('me-nm').textContent=ME.name;
  $('me-role').textContent=isAdmin()?'Equipe · Admin':'Cliente';
  document.querySelectorAll('.admin-only').forEach(e=>e.style.display=isAdmin()?'':'none');
  buildNav();
  await loadData();
  buildClientFilter();
  buildFilters();
  showView(isAdmin()?'dashboard':'board');
  startTick();
  startAutoRefresh();
  subscribeRealtime();
  updateToday();
  await fetchNotes();buildNotifs();updateNotifBadge();updateFilterCount();
  maybeStartTour();
}

/* =====================================================================
   DADOS
   ===================================================================== */
async function loadClients(){
  const {data}=await sb.from('clients').select('*').order('nome');
  CLIENTS=data||[];
  buildClientColors();
}
async function loadTasks(){
  let q=sb.from('tasks').select('*').order('position',{ascending:true}).order('created_at',{ascending:false});
  const {data,error}=await q;
  if(error){toast('Erro ao carregar demandas');console.error(error);TASKS=[];return}
  TASKS=data||[];
}
let TEAM=[]; let ASSIGNEE_OPTS=[]; let _selAssignees=[];
async function loadTeam(){ if(!isAdmin()){TEAM=[];return} const {data}=await sb.from('profiles').select('id,nome,role'); TEAM=data||[]; }
function firstName(n){return (n||'').trim().split(/\s+/)[0];}
function buildAssigneeOptions(){
  const m=new Map();
  TEAM.forEach(u=>{const fn=firstName(u.nome);if(fn)m.set(fn.toLowerCase(),fn);});
  TASKS.forEach(t=>(t.assignees||[]).forEach(a=>{if(a&&!m.has(a.toLowerCase()))m.set(a.toLowerCase(),a);}));
  ASSIGNEE_OPTS=[...m.values()].sort((a,b)=>a.localeCompare(b,'pt'));
}
async function loadData(){await Promise.all([loadClients(),loadTasks(),loadTeam()]);buildAssigneeOptions();}

/* filtro/busca aplicado no client-side */
function visibleTasks(){
  const cf=$('cfilter')?$('cfilter').value:'';
  const ff=$('ffilter')?$('ffilter').value:'';
  const pf=$('pfilter')?$('pfilter').value:'';
  const sf=$('sfilter')?$('sfilter').value:'';
  const q=($('q')?$('q').value:'').toLowerCase().trim();
  return TASKS.filter(t=>{
    if(cf && t.client_id!==cf) return false;
    if(pf && t.priority!==pf) return false;
    if(sf && t.status!==sf) return false;
    if(ff && !(t.assignees||[]).some(a=>a.toLowerCase()===ff.toLowerCase())) return false;
    if(q && !((t.title||'').toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q))) return false;
    const myfn=(ME&&ME.name?ME.name.split(' ')[0].toLowerCase():'');
    if(FILTERS.mine||FILTERS.noAssignee){
      const okMine=FILTERS.mine&&(t.assignees||[]).some(a=>a.toLowerCase().includes(myfn));
      const okNo=FILTERS.noAssignee&&!(t.assignees||[]).length;
      if(!(okMine||okNo))return false;
    }
    if(FILTERS.done||FILTERS.notDone){
      const d=clientStatus(t.status)==='Concluído';
      if(!((FILTERS.done&&d)||(FILTERS.notDone&&!d)))return false;
    }
    if(FILTERS.noDate||FILTERS.overdue||FILTERS.due1d||FILTERS.due1w){
      const has=!!t.due, over=isOverdue(t.due,t.status), nd=clientStatus(t.status)!=='Concluído';
      const days=t.due?Math.ceil((new Date(t.due)-new Date(todayISO()))/86400000):null;
      let ok=false;
      if(FILTERS.noDate&&!has)ok=true;
      if(FILTERS.overdue&&over)ok=true;
      if(FILTERS.due1d&&has&&nd&&days!==null&&days>=0&&days<=1)ok=true;
      if(FILTERS.due1w&&has&&nd&&days!==null&&days>=0&&days<=7)ok=true;
      if(!ok)return false;
    }
    return true;
  });
}
let FILTERS={mine:false,noAssignee:false,done:false,notDone:false,noDate:false,overdue:false,due1d:false,due1w:false};
function setF(k,v){FILTERS[k]=v;updateFilterCount();render();}
function clearFilters(){
  Object.keys(FILTERS).forEach(k=>FILTERS[k]=false);
  ['ffilter','sfilter','pfilter','cfilter'].forEach(id=>{const e=$(id);if(e)e.value='';});
  if($('q'))$('q').value='';
  document.querySelectorAll('#filter-panel input[type=checkbox]').forEach(c=>c.checked=false);
  updateFilterCount();render();
}
function updateFilterCount(){
  let n=0;
  ['cfilter','ffilter','sfilter','pfilter'].forEach(id=>{const e=$(id);if(e&&e.value)n++;});
  Object.values(FILTERS).forEach(v=>{if(v)n++;});
  const b=$('filter-count');if(b){b.style.display=n?'':'none';b.textContent=n;}
}
function toggleFilterPanel(e){if(e)e.stopPropagation();closeNotifs();const p=$('filter-panel');p.classList.toggle('on');}
function closeFilterPanel(){$('filter-panel').classList.remove('on');}

/* ===== NOTIFICAÇÕES ===== */
let NOTIFS=[]; let _recentNotes=[];
async function fetchNotes(){const {data}=await sb.from('task_notes').select('*').order('created_at',{ascending:false}).limit(80);_recentNotes=data||[];}
function timeAgo(ts){const d=(Date.now()-new Date(ts))/1000;
  if(d<60)return 'agora';if(d<3600)return Math.floor(d/60)+' min';
  if(d<86400)return Math.floor(d/3600)+' h';if(d<604800)return Math.floor(d/86400)+' d';
  return new Date(ts).toLocaleDateString('pt-BR');}
function buildNotifs(){
  if(!ME){NOTIFS=[];return;}
  const myfn=ME.name.split(' ')[0].toLowerCase();
  const seen=localStorage.getItem('mgp_notif_seen')||'';
  const items=[];const cutoff=Date.now()-30*86400000;
  TASKS.forEach(t=>{
    if((t.assignees||[]).some(a=>a.toLowerCase().includes(myfn))&&new Date(t.created_at).getTime()>cutoff)
      items.push({ts:t.created_at,icon:'📋',text:'Demanda atribuída a você: <b>'+esc(t.title)+'</b>',taskId:t.id});
  });
  _recentNotes.forEach(n=>{
    if((n.visibility||'public')!=='public'||n.author_id===ME.id)return;
    const t=TASKS.find(x=>x.id===n.task_id);if(!t)return;
    if(!(t.assignees||[]).some(a=>a.toLowerCase().includes(myfn)))return;
    items.push({ts:n.created_at,icon:'💬',text:'<b>'+esc(n.author_name||'Alguém')+'</b> comentou em '+esc(t.title),taskId:t.id});
  });
  items.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  items.forEach(it=>{it.unread=!seen||new Date(it.ts)>new Date(seen);});
  if(!localStorage.getItem('mgp_welcome'))
    items.push({ts:'2000-01-01T00:00:00Z',icon:'👋',text:'<b>Bem-vindo ao Modesto Tasks!</b> Você recebe um aviso aqui quando uma demanda for sua ou quando comentarem numa demanda que você acompanha.',welcome:true,unread:true});
  NOTIFS=items;
}
function updateNotifBadge(){
  const n=PREFS.notif==='off'?0:NOTIFS.filter(i=>i.unread).length;
  const b=$('notif-badge');if(b){b.style.display=n?'':'none';b.textContent=n>9?'9+':n;}
}
function renderNotifs(){
  let items=NOTIFS;
  if(PREFS.notifUnread==='on')items=items.filter(i=>i.unread);
  const el=$('notif-list');if(!el)return;
  if(!items.length){el.innerHTML='<div class="n-empty">🐾 Nenhuma notificação'+(PREFS.notifUnread==='on'?' não lida':'')+'.</div>';return;}
  el.innerHTML=items.map(i=>`<div class="nitem ${i.unread?'unread':''}" onclick="${i.taskId?`openNotif('${i.taskId}')`:'closeNotifs()'}">
    <div class="nic">${i.icon}</div>
    <div class="ntx">${i.text}${i.welcome?'':`<div class="ntm">${timeAgo(i.ts)}</div>`}</div>
    ${i.unread?'<div class="udot"></div>':''}
  </div>`).join('');
}
function openNotif(id){closeNotifs();openDetail(id);}
async function toggleNotifs(e){
  if(e)e.stopPropagation();closeFilterPanel();
  const p=$('notif-panel');
  if(p.classList.contains('on')){closeNotifs();return;}
  await fetchNotes();buildNotifs();renderNotifs();p.classList.add('on');
  localStorage.setItem('mgp_notif_seen',new Date().toISOString());
  localStorage.setItem('mgp_welcome','1');
  updateNotifBadge();
}
function closeNotifs(){$('notif-panel').classList.remove('on');}

document.addEventListener('click',e=>{
  const fp=$('filter-panel'),np=$('notif-panel');
  if(fp&&fp.classList.contains('on')&&!fp.contains(e.target)&&!$('filter-btn').contains(e.target))closeFilterPanel();
  if(np&&np.classList.contains('on')&&!np.contains(e.target)&&!$('notif-btn').contains(e.target))closeNotifs();
});

   ===================================================================== */
function renderDashboard(){
  const ts=visibleTasks();
  const done=ts.filter(t=>clientStatus(t.status)==='Concluído').length;
  const prog=ts.filter(t=>['Em andamento','Impeditivo/Em aprovação'].includes(clientStatus(t.status))).length;
  const todo=ts.filter(t=>clientStatus(t.status)==='Não iniciado').length;
  const total=ts.length||1;
  const pct=Math.round(done/total*100);

  const d7=daysAgo(7);
  const novos=ts.filter(t=>new Date(t.created_at)>=d7).length;
  const atualizados=ts.filter(t=>new Date(t.updated_at)>=d7).length;
  const prontos=ts.filter(t=>DONE_STATUSES.includes(t.status)&&new Date(t.updated_at)>=d7).length;
  const pendentes=ts.filter(t=>t.due&&isOverdue(t.due,t.status)).length;

  // donut
  const R=54,C=2*Math.PI*R;
  const segs=[['Concluído',done,'var(--st-fin)'],['Em andamento',prog,'var(--st-prog)'],['Para fazer',todo,'var(--st-todo)']];
  let off=0;
  const circles=segs.map(([,val,col])=>{
    const len=C*(val/total);const el=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${col}" stroke-width="20" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
    off+=len;return el;
  }).join('');

  // workload por responsável
  const wl={};
  ts.filter(t=>!DONE_STATUSES.includes(t.status)).forEach(t=>{
    const as=(t.assignees&&t.assignees.length)?t.assignees:['Não atribuídas'];
    as.forEach(a=>wl[a]=(wl[a]||0)+1);
  });
  const wlArr=Object.entries(wl).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const wlMax=Math.max(1,...wlArr.map(x=>x[1]));

  // % de conclusão por cliente
  const perCli={};
  ts.forEach(t=>{const k=t.client_id||'_';(perCli[k]=perCli[k]||{tot:0,done:0}).tot++;if(clientStatus(t.status)==='Concluído')perCli[k].done++;});
  const cliArr=Object.entries(perCli).map(([id,o])=>({id,nome:clientName(id),tot:o.tot,done:o.done,pct:Math.round(o.done/o.tot*100)})).sort((a,b)=>b.tot-a.tot);
  const cliprogHtml=`<div class="panel" style="margin-top:16px"><h3>Conclusão por cliente</h3><div class="cliprog">${cliArr.map(c=>`
    <div class="r">
      <div class="who"><span class="sw" style="background:${clientColor(c.id)}"></span><span>${esc(c.nome)}</span></div>
      <div class="bar"><i style="width:${c.pct}%;background:${clientColor(c.id)}"></i></div>
      <div class="pct" style="color:${clientColor(c.id)}">${c.pct}%</div>
    </div>`).join('')}</div><div style="font-size:11.5px;color:var(--muted);margin-top:10px">Percentual de demandas concluídas sobre o total de cada cliente.</div></div>`;

  $('v-dashboard').innerHTML=`
    <div class="stat-row">
      <div class="stat"><span class="ic" style="color:var(--st-done)">✓</span><div class="n">${prontos}</div><div class="l">Prontos · últimos 7 dias</div></div>
      <div class="stat"><span class="ic" style="color:#2D6FCF">✎</span><div class="n">${atualizados}</div><div class="l">Atualizados · últimos 7 dias</div></div>
      <div class="stat"><span class="ic" style="color:var(--brass)">✦</span><div class="n">${novos}</div><div class="l">Novos · últimos 7 dias</div></div>
      <div class="stat"><span class="ic" style="color:var(--danger)">⧗</span><div class="n" style="color:${pendentes?'var(--danger)':'inherit'}">${pendentes}</div><div class="l">Atrasadas</div></div>
    </div>
    <div class="dash-grid">
      <div class="panel">
        <h3>Progresso da equipe</h3>
        <div class="donut-wrap">
          <div style="position:relative;width:140px;height:140px;flex-shrink:0">
            <svg width="140" height="140">${circles}</svg>
            <div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center">
              <div><div style="font-family:var(--font-d);font-size:28px;font-weight:600">${pct}%</div><div style="font-size:10px;color:var(--muted)">Concluído</div></div>
            </div>
          </div>
          <div class="legend">
            ${segs.map(([l,v,c])=>`<div class="row"><span class="dot" style="background:${c}"></span>${l}<span class="v">${v}</span></div>`).join('')}
            <div class="row" style="border-top:1px solid var(--line);padding-top:8px;margin-top:2px">Total<span class="v">${ts.length}</span></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <h3>Carga da equipe</h3>
        <div class="wl">
          ${wlArr.length?wlArr.map(([n,c])=>`
            <div class="r">
              <div class="who"><div class="av">${initials(n)}</div><span>${esc(n)}</span></div>
              <div class="bar"><i style="width:${Math.round(c/wlMax*100)}%"></i></div>
              <div class="cnt">${c}</div>
            </div>`).join(''):'<div class="empty" style="padding:20px">Sem demandas abertas.</div>'}
        </div>
      </div>
    </div>`;
}

  return `<div class="card-t" style="border-left-color:${accent}" data-id="${t.id}"
      ${isAdmin()?`draggable="true" ondragstart="dragStart(event,'${t.id}')" ondragend="this.classList.remove('dragging')"`:''}

    <div class="tt">${esc(t.title)}</div>

      ${(t.subtasks&&t.subtasks.length)?(()=>{const d=t.subtasks.filter(x=>x.done).length,tt=t.subtasks.length;return `<span class="sub-prog ${d===tt?'full':''}">☑ ${d}/${tt}</span>`;})():''}
    </div>
    <div class="card-foot">
      <span class="tchip ${running?'run':''}" onclick="toggleTimer(event,'${t.id}')" title="${running?'Pausar':'Iniciar'} tempo">
        <span class="p">${running?'⏸':'▶'}</span>
        <span class="js-timer" data-base="${t.time_spent||0}" data-start="${running?new Date(t.timer_start).getTime():''}">${fmtDur(taskElapsed(t))}</span>

/* drag & drop (admin) */
let _drag=null;
let _lastMoved=null;
let _skipRefreshUntil=0;
function dragStart(e,id){_drag=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
async function dropCol(e,status){
  e.preventDefault();document.querySelectorAll('.col').forEach(c=>c.classList.remove('dragover'));
  if(!_drag)return;const id=_drag;_drag=null;
  const t=TASKS.find(x=>x.id===id);if(!t||t.status===status)return;
  const fromStatus=t.status;
  const cardEl=document.querySelector('.card-t[data-id="'+id+'"]');
  const targetCards=e.currentTarget.querySelector('.cards');
  // move o card na hora (fluido, sem re-render, mantém o scroll)
  if(cardEl&&targetCards){
    targetCards.appendChild(cardEl);
    fixPlaceholders();updateColCounts();
    cardEl.classList.add('just-moved');setTimeout(()=>cardEl.classList.remove('just-moved'),600);
  }
  _skipRefreshUntil=Date.now()+3000;
  const becameDone=DONE_STATUSES.includes(status)&&!DONE_STATUSES.includes(fromStatus);
  const leftDone=!DONE_STATUSES.includes(status)&&DONE_STATUSES.includes(fromStatus);
  const patch={status};
  if(becameDone)patch.completed_at=new Date().toISOString();
  if(leftDone)patch.completed_at=null;
  Object.assign(t,patch);
  if(becameDone){celebrate();toast('🎉 Demanda concluída!');}
  const {error}=await sb.from('tasks').update(patch).eq('id',id);
  if(error){toast('Erro ao mover');await refresh();return}
  if(becameDone)await maybeRecur(t);
  updateToday();
}

/* =====================================================================
   CALENDAR
   ===================================================================== */
function renderCalendar(){
  const ts=visibleTasks().filter(t=>t.due);
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const first=new Date(y,m,1),start=new Date(first);start.setDate(1-((first.getDay()+6)%7));
  const monthName=calRef.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const dows=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const out=d.getMonth()!==m;
    const today=iso===todayISO();
    const evs=ts.filter(t=>t.due===iso);
    cells+=`<div class="cal-d ${out?'out':''} ${today?'today':''}">
      <div class="dn">${d.getDate()}</div>
      ${evs.slice(0,3).map(t=>{const cc=clientColor(t.client_id);return `<div class="cal-ev" style="background:${hexA(cc,0.16)};color:${cc};border-left:3px solid ${cc}" onclick="openDetail('${t.id}')" title="${esc(clientName(t.client_id))} · ${esc(t.title)}">${esc(t.title)}</div>`}).join('')}
      ${evs.length>3?`<div style="font-size:10px;color:var(--muted);margin-top:2px">+${evs.length-3}</div>`:''}
    </div>`;
  }
  $('v-calendar').innerHTML=`<div class="cal">
    <div class="cal-h">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <button class="cal-nav" onclick="calMove(1)">›</button>
      <div class="m">${monthName}</div>
    </div>
    <div class="cal-legend">${CLIENTS.map(c=>`<span class="cleg"><span class="cdot" style="background:${clientColor(c.id)}"></span>${esc(c.nome)}</span>`).join('')}</div>
    <div class="cal-grid">${dows.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}</div>
  </div>`;
}
function calMove(n){calRef.setMonth(calRef.getMonth()+n);renderCalendar()}

function renderNotes(){

async function addNote(){

/* ===== Subtarefas (checklist) ===== */
function renderSubtasks(t){
  const subs=t.subtasks||[];
  if(!subs.length)return isAdmin()?'<div style="color:var(--muted);font-size:12.5px">Nenhuma subtarefa ainda.</div>':'';

function _curDetail(){return TASKS.find(x=>x.id===DETAIL_ID);}
async function _saveSubs(t){_skipRefreshUntil=Date.now()+3000;const {error}=await sb.from('tasks').update({subtasks:t.subtasks}).eq('id',t.id);if(error){toast('Erro ao salvar subtarefa');console.error(error);}}

function addSub(){const t=_curDetail();if(!t)return;const inp=$('d-sub-input');const v=(inp.value||'').trim();if(!v)return;t.subtasks=t.subtasks||[];t.subtasks.push({id:Date.now().toString(36),text:v,done:false});inp.value='';_reSubs(t);_saveSubs(t);}
function toggleSub(i){const t=_curDetail();if(!t||!t.subtasks)return;t.subtasks[i].done=!t.subtasks[i].done;_reSubs(t);_saveSubs(t);}
function delSub(i){const t=_curDetail();if(!t||!t.subtasks)return;t.subtasks.splice(i,1);_reSubs(t);_saveSubs(t);}

/* salvar alterações do detalhe (admin) */
async function saveDetail(){
  const t=TASKS.find(x=>x.id===DETAIL_ID);if(!t)return;
  const patch={
    title:$('d-title').value.trim()||t.title,
    status:$('d-status').value,
    priority:$('d-prio').value,
    assignees:[..._selAssignees],
    due:$('d-due').value||null,
    recurrence:$('d-rec').value,
    description:$('d-desc').value,
  };
  const becameDone = DONE_STATUSES.includes(patch.status) && !DONE_STATUSES.includes(t.status);
  const leftDone = !DONE_STATUSES.includes(patch.status) && DONE_STATUSES.includes(t.status);
  if(becameDone) patch.completed_at=new Date().toISOString();
  if(leftDone)   patch.completed_at=null;
  const {error}=await sb.from('tasks').update(patch).eq('id',t.id);
  if(error){toast('Erro ao salvar');console.error(error);return}
  Object.assign(t,patch);
  if(becameDone){celebrate();toast('🎉 Demanda concluída!');await maybeRecur(t);}
  else toast('Demanda atualizada');
  await refresh();
}
/* mudança rápida de status (dropdown do detalhe / drag) */
async function quickField(field,value){
  const t=TASKS.find(x=>x.id===DETAIL_ID);if(!t)return;
  if(field==='status'){await changeStatus(t,value);}
}
async function changeStatus(t,status){
  const becameDone=DONE_STATUSES.includes(status)&&!DONE_STATUSES.includes(t.status);
  const leftDone=!DONE_STATUSES.includes(status)&&DONE_STATUSES.includes(t.status);
  const patch={status};
  if(becameDone) patch.completed_at=new Date().toISOString();
  if(leftDone)   patch.completed_at=null;
  const {error}=await sb.from('tasks').update(patch).eq('id',t.id);
  if(error){toast('Erro ao mover');return}
  Object.assign(t,patch);
  if(becameDone){celebrate();toast('🎉 Demanda concluída!');await maybeRecur(t);}
  _lastMoved=t.id;
  await refresh();
}

/* =====================================================================
   RECORRÊNCIA (diária / semanal) — gera a próxima ao concluir
   ===================================================================== */
async function maybeRecur(t){
  if(!t.recurrence||t.recurrence==='none')return;
  const base=t.due?new Date(t.due):new Date();
  base.setDate(base.getDate()+(t.recurrence==='weekly'?7:1));
  const nextDue=base.toISOString().slice(0,10);
  await sb.from('tasks').insert({
    client_id:t.client_id,title:t.title,description:t.description,status:'Não iniciado',
    priority:t.priority,assignees:t.assignees,due:nextDue,recurrence:t.recurrence,
  });
  toast('♻︎ Próxima recorrência criada ('+(t.recurrence==='weekly'?'+7 dias':'+1 dia')+')');
}

/* =====================================================================
   TEMPO
   ===================================================================== */
async function toggleTimer(e,id){
  e.stopPropagation();_skipRefreshUntil=Date.now()+3000;
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  if(t.timer_start){
    const add=(Date.now()-new Date(t.timer_start).getTime())/1000;
    const {error}=await sb.from('tasks').update({time_spent:Math.round((t.time_spent||0)+add),timer_start:null,timer_by:null}).eq('id',id);
    if(error){toast('Erro');return}
    t.time_spent=Math.round((t.time_spent||0)+add);t.timer_start=null;toast('⏸ Cronômetro pausado');
  }else{
    // pausa outros do mesmo usuário
    for(const o of TASKS.filter(x=>x.timer_start&&x.timer_by===ME.id)){
      const add=(Date.now()-new Date(o.timer_start).getTime())/1000;
      await sb.from('tasks').update({time_spent:Math.round((o.time_spent||0)+add),timer_start:null,timer_by:null}).eq('id',o.id);
      o.time_spent=Math.round((o.time_spent||0)+add);o.timer_start=null;
    }
    const patch={timer_start:new Date().toISOString(),timer_by:ME.id};
    if(t.status==='Não iniciado')patch.status='Em Andamento';
    const {error}=await sb.from('tasks').update(patch).eq('id',id);
    if(error){toast('Erro');return}
    Object.assign(t,patch);toast('▶ Cronômetro iniciado');
  }
  render();if(DETAIL_ID)renderDetailBody();
}
function startTick(){setInterval(()=>{
  document.querySelectorAll('.js-timer').forEach(el=>{
    const st=Number(el.dataset.start)||0;if(!st)return;
    el.textContent=fmtDur((Number(el.dataset.base)||0)+(Date.now()-st)/1000);
  });
},1000)}

/* =====================================================================
   SYNC — atualização entre usuários
   ===================================================================== */
function startAutoRefresh(){
  setInterval(()=>{if(Date.now()<_skipRefreshUntil)return;if(!document.hidden&&!DETAIL_ID&&!$('tmodal').classList.contains('on'))refresh()},25000);
  window.addEventListener('focus',()=>{if(!DETAIL_ID)refresh()});
}
function subscribeRealtime(){
  try{
    sb.channel('tasks-rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>{if(Date.now()<_skipRefreshUntil)return;if(!DETAIL_ID&&!$('tmodal').classList.contains('on'))refresh()})
      .subscribe();
  }catch(e){/* realtime opcional */}
}

function avatarInner(name,url){return url?`<img src="${url}" alt="">`:initials(name);}
function setMeAvatar(){const el=$('me-av');if(el)el.innerHTML=avatarInner(ME.name,ME.avatar_url);}
async function pickAvatar(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';

function updateToday(){
  if(!ME)return;const el=$('side-today');if(!el)return;
  const today=todayISO();const fn=ME.name.split(' ')[0].toLowerCase();
  const mine=TASKS.filter(t=>t.due===today&&clientStatus(t.status)!=='Concluído'&&(t.assignees||[]).some(a=>a.toLowerCase().includes(fn)));
  const all=TASKS.filter(t=>t.due===today&&clientStatus(t.status)!=='Concluído');
  const n=mine.length||all.length;
  $('today-n').textContent=n;
  el.style.display=n>0?'flex':'none';

  const late=TASKS.filter(t=>isOverdue(t.due,t.status)&&(t.assignees||[]).some(a=>a.toLowerCase().includes(fn)));

let _coachI=0;
function _coachVisible(el){return el && el.offsetParent!==null && el.getBoundingClientRect().width>0;}
function coachStep(){
  const c=COACH[_coachI];const el=document.querySelector(c.sel);
  if(!_coachVisible(el)){ if(_coachI<COACH.length-1){_coachI++;return coachStep();} return endCoach(); }
  const r=el.getBoundingClientRect();const pad=8;
  const hole=$('coach-hole');
  hole.style.left=(r.left-pad)+'px';hole.style.top=(r.top-pad)+'px';
  hole.style.width=(r.width+pad*2)+'px';hole.style.height=(r.height+pad*2)+'px';
  const tip=$('coach-tip');
  tip.innerHTML=`<h4>${c.title}</h4><p>${c.text}</p><div class="cnav"><span class="cstep">${_coachI+1} de ${COACH.length}</span><div class="cbtns">${_coachI>0?'<button class="coach-skip" onclick="coachPrev()">Voltar</button>':'<button class="coach-skip" onclick="endCoach()">Pular</button>'}<button class="coach-next" onclick="${_coachI===COACH.length-1?'endCoach()':'coachNext()'}">${_coachI===COACH.length-1?'Concluir ✓':'Próximo →'}</button></div></div>`;
  let top=r.bottom+14; if(top+190>window.innerHeight) top=Math.max(12,r.top-200);
  let left=Math.min(Math.max(12,r.left), window.innerWidth-320);
  tip.style.top=top+'px';tip.style.left=left+'px';
}

  const rip=document.createElement('span');rip.className='ripple-el';

  document.querySelectorAll('#v-board .col').forEach(col=>{
    const n=col.querySelectorAll('.cards > .card-t').length;
    const c=col.querySelector('.col-h .c');if(c)c.textContent=n;
  });
}
function fixPlaceholders(){
  document.querySelectorAll('#v-board .cards').forEach(cds=>{
    const hasCard=cds.querySelector('.card-t');
    const ph=cds.querySelector('.ph-empty');
    if(hasCard&&ph)ph.remove();
    if(!hasCard&&!ph){const d=document.createElement('div');d.className='ph-empty';d.style.cssText='padding:12px;text-align:center;color:var(--muted);font-size:12px';d.textContent='—';cds.appendChild(d);}
  });
}

(async function(){
  if(SUPABASE_ANON==='COLE_AQUI_A_CHAVE_ANON'){
    $('li-err').textContent='⚠ Falta configurar a chave anon do Supabase no código.';
  }
  const {data:{session}}=await sb.auth.getSession();
  if(session) boot();
})();
</script>
