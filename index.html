<script>
/* =====================================================================
   ADIÇÃO 10 — por que o acesso criado não entrava
   ---------------------------------------------------------------------
   Duas causas, tratadas aqui:
   1) o login dizia sempre "e-mail ou senha inválidos", escondendo o
      motivo real (quase sempre: e-mail ainda não confirmado);
   2) com a confirmação ligada, o Supabase manda um link por e-mail —
      e o envio padrão dele só funciona para membros do projeto, então
      o cliente nunca recebe e nunca consegue entrar.
   ===================================================================== */

/* SQL que libera quem ficou preso esperando confirmação */
const SQL_LIBERAR_TODOS =
`-- Libera todos os acessos que ficaram presos esperando confirmação
update auth.users
   set email_confirmed_at = now()
 where email_confirmed_at is null;`;

function sqlLiberar(email){
  return `-- Libera o acesso de ${email}
update auth.users
   set email_confirmed_at = now()
 where email = '${String(email).replace(/'/g,"''")}'
   and email_confirmed_at is null;`;
}
function mgCopiar(txt, aviso){
  const ok = ()=> toast(aviso||'Copiado — cole no SQL Editor do Supabase');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(()=>mgCopiaManual(txt));
  } else mgCopiaManual(txt);
}
function mgCopiaManual(txt){
  const ta=document.createElement('textarea');
  ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('Copiado') }catch(_){ toast('Copie o texto mostrado na tela') }
  ta.remove();
}

/* ---------- login com a razão verdadeira ---------- */
signIn = async function(){
  const email=($('li-email').value||'').trim();
  const pass=$('li-pass').value||'';
  const err=$('li-err');
  err.innerHTML='';
  if(!email||!pass){ err.textContent='Preencha e-mail e senha.'; return }

  const {error} = await sb.auth.signInWithPassword({email, password:pass});
  if(!error){ await boot(); return }

  const m = (error.message||'').toLowerCase();

  if(/not confirmed|email_not_confirmed/.test(m)){
    err.innerHTML = `<b>Este e-mail ainda não foi confirmado.</b><br>
      O Supabase está exigindo confirmação, e o envio padrão dele costuma não chegar para quem é de fora do projeto.
      Peça a quem administra para liberar — leva 10 segundos.
      <div class="mg-liberar">
        <button onclick="mgCopiar(sqlLiberar('${esc(email)}'),'SQL copiado — cole no SQL Editor do Supabase e rode')">Copiar SQL que libera este acesso</button>
        <button onclick="mgVerSQL('${esc(email)}')">Ver o SQL</button>
      </div>`;
    return;
  }
  if(/invalid login credentials|invalid_credentials/.test(m)){
    err.innerHTML = `<b>E-mail ou senha incorretos.</b><br>
      Confira se não sobrou espaço no começo ou no fim ao colar.`;
    return;
  }
  if(/rate limit|too many/.test(m)){
    err.innerHTML = `<b>Muitas tentativas seguidas.</b><br>Espere um minuto e tente de novo.`;
    return;
  }
  if(/user not found/.test(m)){
    err.innerHTML = `<b>Não existe conta com este e-mail.</b><br>Confira o endereço ou peça um acesso novo.`;
    return;
  }
  err.innerHTML = `<b>Não foi possível entrar.</b><br>${esc(error.message||'erro desconhecido')}`;
};
function mgVerSQL(email){
  const err=$('li-err');
  if(err && !err.querySelector('.mg-sqlbox')){
    err.insertAdjacentHTML('beforeend', `<div class="mg-sqlbox">${esc(sqlLiberar(email))}</div>`);
  }
}

/* ---------- ao criar acesso, já oferece a liberação ---------- */
function mgBlocoLiberacao(email){
  return `<div style="margin-top:8px">
      <button class="mini-btn" onclick="mgCopiar(sqlLiberar('${esc(email)}'),'SQL copiado — cole no SQL Editor do Supabase')">Copiar SQL que libera este acesso</button>
    </div>
    <div class="mg-sqlbox">${esc(sqlLiberar(email))}</div>
    <div style="font-size:11.5px;color:var(--muted);margin-top:6px">
      Para não precisar disso nas próximas vezes: Supabase → Authentication → Providers → Email → desligue <b>Confirm email</b>.
    </div>`;
}
/* injeta o bloco sempre que a mensagem falar em confirmação pendente */
function mgEnriquecerAviso(idCaixa, email){
  const c = $(idCaixa); if(!c || !email) return;
  if(/confirma..o de e-mail est./i.test(c.textContent) && !c.querySelector('.mg-sqlbox')){
    c.insertAdjacentHTML('beforeend', mgBlocoLiberacao(email));
  }
}
const _mg10CriarCli = criarClienteCompleto;
criarClienteCompleto = async function(){
  const email = $('nc-email') ? ($('nc-email').value||'').trim() : '';
  await _mg10CriarCli();
  setTimeout(()=>mgEnriquecerAviso('nc-res', email), 60);
};
const _mg10CriarAc = criarAcessoParaCliente;
criarAcessoParaCliente = async function(){
  const email = $('ac2-email') ? ($('ac2-email').value||'').trim() : '';
  await _mg10CriarAc();
  setTimeout(()=>mgEnriquecerAviso('ac2-res', email), 60);
};

/* ---------- atalho para o administrador liberar todos de uma vez ---------- */
function liberarTodosAcessos(){
  mgCopiar(SQL_LIBERAR_TODOS, 'SQL copiado — cole no SQL Editor do Supabase e rode');
}
</script>

<script>
/* =====================================================================
   ADIÇÃO 12
   • tela de Início: escolhe o módulo e vê o resumo do seu dia
   • a barra lateral recolhe ao entrar num módulo; o botão de início
     na barra de cima traz você de volta
   ===================================================================== */

/* ---- contêiner da tela ---- */
(function(){
  const cont=document.querySelector('.content');
  if(cont && !document.getElementById('v-home')){
    const d=document.createElement('div'); d.className='view'; d.id='v-home';
    cont.insertBefore(d, cont.firstChild);
  }
})();
/* ---- "Início" como primeira opção da barra ---- */
(function(){
  if(!NAV.some(n=>n.v==='home')) NAV.unshift({v:'home', ic:'⌂', label:'Início'});
  if($('nav') && $('nav').children.length) buildNav();
})();
/* ---- botão de início na barra de cima ---- */
(function(){
  const topo=document.querySelector('.topbar');
  if(topo && !document.getElementById('mg-btn-home')){
    const b=document.createElement('button');
    b.className='mg-home'; b.id='mg-btn-home';
    b.innerHTML='<span class="ic">⌂</span> Início';
    b.onclick=()=>showView('home');
    topo.insertBefore(b, topo.firstChild);
  }
})();

/* ---- ao escolher um módulo, a barra sai de cena ---- */
const _mg12ShowView = showView;
showView = function(v){
  const r = _mg12ShowView(v);
  const emCasa = (VIEW==='home');
  document.body.classList.toggle('mg-focado', !emCasa);
  return r;
};
const _mg12Render = render;
render = function(){
  if(VIEW==='home') return renderHome();
  return _mg12Render();
};

/* ---- quais atalhos aparecem, conforme o papel ---- */
function mgAtalhos(){
  const desc = {
    board:'Demandas no quadro por situação',
    list:'Todas as demandas em lista',
    calendar:'Demandas pelo prazo no mês',
    checklist:'Suas anotações e pendências',
    clientes:'Empresas, logos e acessos',
    docs:'Apresentações, propostas e relatórios',
    chat:'Conversas com a equipe e clientes',
    settings:'Aparência, conta e notificações',
  };
  return NAV.filter(n=>n.v!=='home' && (!n.admin || isAdmin()))
            .map(n=>({v:n.v, ic:n.ic, label:n.label, ds:desc[n.v]||''}));
}

/* ---- demandas de hoje e atrasadas, minhas ---- */
function mgMinhasDeHoje(){
  if(!ME || !ME.name) return [];
  const meu = ME.name.split(' ')[0].toLowerCase();
  const hoje = new Date().toISOString().slice(0,10);
  return (TASKS||[]).filter(t=>{
    if(DONE_STATUSES.includes(t.status)) return false;
    const minha = (t.assignees||[]).some(a=>String(a).toLowerCase().includes(meu));
    if(!minha) return false;
    return t.prazo && t.prazo<=hoje;
  }).sort((a,b)=>String(a.prazo).localeCompare(String(b.prazo)));
}

/* ---- mensagens que chegaram para você ---- */
let MG_NAOLIDAS = [];
async function mgCarregarNaoLidas(){
  MG_NAOLIDAS = [];
  if(CH_READY!==true || !ME) return;
  try{
    if(!CHANNELS.length) await loadChannels();
    const {data:membros} = await sb.from('channel_members')
      .select('channel_id,last_read_at').eq('profile_id', ME.id);
    const marcos = {};
    (membros||[]).forEach(m=>{ marcos[m.channel_id]=m.last_read_at });
    const ids = CHANNELS.map(c=>c.id);
    if(!ids.length) return;
    const {data:msgs} = await sb.from('messages')
      .select('id,channel_id,author_id,author_name,body,created_at')
      .order('created_at',{ascending:false}).limit(120);
    const porCanal = {};
    (msgs||[]).forEach(m=>{
      if(m.author_id===ME.id) return;                       /* não conto as minhas */
      const marco = marcos[m.channel_id];
      if(marco && m.created_at<=marco) return;              /* já li */
      (porCanal[m.channel_id]=porCanal[m.channel_id]||[]).push(m);
    });
    MG_NAOLIDAS = Object.keys(porCanal).map(cid=>{
      const c = CHANNELS.find(x=>x.id===cid);
      const lista = porCanal[cid];
      return {canal:c, quantas:lista.length, ultima:lista[0]};
    }).filter(x=>x.canal);
  }catch(e){ console.warn('[não lidas]', e) }
}
/* ao abrir um canal, marca como lido */
const _mg12OpenChan = openChan;
openChan = async function(id){
  const r = await _mg12OpenChan(id);
  if(ME && CH_READY===true){
    try{ await sb.from('channel_members').update({last_read_at:new Date().toISOString()})
            .eq('channel_id',id).eq('profile_id',ME.id) }catch(_){}
  }
  return r;
};

/* ---- desenha o Início ---- */
function renderHome(){
  if(VIEW!=='home') return;
  const el=$('v-home'); if(!el) return;
  const h=new Date().getHours();
  const saud = h<12 ? 'Bom dia' : h<18 ? 'Boa tarde' : 'Boa noite';
  const primeiro = (ME && ME.name ? ME.name.split(' ')[0] : '');
  const minhas = mgMinhasDeHoje();
  const hoje = new Date().toISOString().slice(0,10);

  el.innerHTML = `
    <div class="mg-ola">${saud}${primeiro?', '+esc(primeiro):''}.</div>
    <div class="mg-ola-sub">${isAdmin()
        ? 'Escolha por onde começar — ou veja o que já está esperando por você.'
        : 'Aqui ficam os documentos da sua empresa.'}</div>
    <div class="mg-atalhos">${mgAtalhos().map(a=>{
      const badge = (a.v==='chat' && MG_NAOLIDAS.length)
        ? `<span class="sino">${MG_NAOLIDAS.reduce((s,x)=>s+x.quantas,0)}</span>`
        : (a.v==='board' && minhas.length) ? `<span class="sino">${minhas.length}</span>` : '';
      return `<button class="mg-atalho" onclick="showView('${a.v}')">
          ${badge}<span class="ic">${a.ic}</span>
          <div class="nm">${esc(a.label)}</div>
          <div class="ds">${esc(a.ds)}</div>
        </button>`;
    }).join('')}</div>
    ${isAdmin() ? `
    <div class="mg-duas">
      <div class="mg-painel">
        <h3>Suas demandas de hoje <span class="cnt">${minhas.length}</span></h3>
        <div class="mg-linhas">${
          minhas.length ? minhas.slice(0,6).map(t=>{
            const atrasada = !!(t.due && t.due < hoje);
            return `<button class="mg-linha" onclick="mgIrParaDemanda('${esc(String(t.id))}')">
                <span class="pt" style="background:${clientColor(t.client_id)}"></span>
                <span class="meio">
                  <span class="ti">${esc(t.title||'(sem título)')}</span>
                  <span class="sb">${esc(clientName(t.client_id))} · ${esc(t.status||'')}</span>
                </span>
                <span class="et ${atrasada?'atraso':'hoje'}">${atrasada?'Atrasada':'Hoje'}</span>
              </button>`;
          }).join('') : `<div class="mg-vazio">Nada com prazo para hoje. 🎉</div>`
        }</div>
      </div>
      <div class="mg-painel" style="animation-delay:.36s">
        <h3>Mensagens para você <span class="cnt">${MG_NAOLIDAS.reduce((s,x)=>s+x.quantas,0)}</span></h3>
        <div class="mg-linhas">${
          MG_NAOLIDAS.length ? MG_NAOLIDAS.slice(0,6).map(x=>{
            const c=x.canal;
            const nome = (typeof mgChanNome==='function') ? mgChanNome(c) : c.nome;
            const previa = (x.ultima.author_name||'')+': '+String(x.ultima.body||'').replace(/\s+/g,' ').slice(0,44);
            return `<button class="mg-linha" onclick="showView('chat');openChan('${c.id}')">
                <span class="pt" style="background:${c.tipo==='client'?clientColor(c.client_id):'var(--brass)'}"></span>
                <span class="meio">
                  <span class="ti">${c.tipo==='dm'?'':'#'}${esc(nome)}</span>
                  <span class="sb">${esc(previa)}</span>
                </span>
                <span class="et nova">${x.quantas}</span>
              </button>`;
          }).join('') : `<div class="mg-vazio">${CH_READY===true?'Nenhuma mensagem nova.':'O chat ainda não foi ativado.'}</div>`
        }</div>
      </div>
    </div>` : ''}`;
}
function mgIrParaDemanda(id){
  showView('board');
  setTimeout(()=>{ if(typeof openDetail==='function') openDetail(id); }, 260);
}

/* ---- ao entrar, começa pelo Início e busca as não lidas ---- */
(function(){
  const _mg12Boot = boot;
  boot = async function(){
    const r = await _mg12Boot();
    try{
      if(CH_READY===null && typeof checkChatTables==='function') await checkChatTables();
      await mgCarregarNaoLidas();
    }catch(_){}
    showView('home');
    return r;
  };
})();
</script>

<script>
/* =====================================================================
   ADIÇÃO 13 — "criei, tem que funcionar"
   ---------------------------------------------------------------------
   O acesso só não entra direto porque o Supabase está com a confirmação
   por e-mail ligada. Isso é um botão no painel, que a plataforma não tem
   permissão de desligar (só a chave secreta do servidor poderia, e ela
   não pode viver aqui). O que dá para fazer — e está feito aqui — é
   DETECTAR a configuração e avisar antes, com o caminho pronto.
   ===================================================================== */

let MG_AUTH = null;   /* {autoconfirma:bool, cadastroLiberado:bool} */

async function mgVerificarAuth(){
  try{
    const r = await fetch(SUPABASE_URL+'/auth/v1/settings', {headers:{apikey:SUPABASE_ANON}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const s = await r.json();
    MG_AUTH = {
      autoconfirma: s.mailer_autoconfirm === true,
      cadastroLiberado: s.disable_signup !== true,
    };
  }catch(e){ MG_AUTH = null; console.warn('[auth settings]', e) }
  return MG_AUTH;
}

const MG_LINK_AUTH = 'https://supabase.com/dashboard/project/eeqaabwsheaiwyhujcqj/auth/providers';

/* aviso montado conforme o que estiver errado */
function mgAlertaAcesso(){
  if(!isAdmin() || !MG_AUTH) return '';
  const problemas = [];
  if(!MG_AUTH.cadastroLiberado) problemas.push('cadastro');
  if(!MG_AUTH.autoconfirma)     problemas.push('confirmacao');
  if(!problemas.length) return '';

  const passos = [];
  if(problemas.includes('cadastro'))
    passos.push('ligue <b>Allow new users to sign up</b>');
  if(problemas.includes('confirmacao'))
    passos.push('desligue <b>Confirm email</b>');

  return `<div class="mg-alerta mg-alerta-acesso">
    <span class="sinal">⚠</span>
    <div class="txt">
      <b>Os acessos criados aqui não vão entrar direto.</b>
      O Supabase está exigindo confirmação por e-mail — e o envio padrão dele quase nunca chega para quem é de fora do projeto.
      É um ajuste de uma vez só, e depois disso todo acesso criado já funciona na hora.
      <ol class="mg-passos">
        <li>Abra <b>Authentication → Providers → Email</b></li>
        <li>${passos.join(' e ')}</li>
        <li>Salve e pronto — não precisa mexer nunca mais</li>
      </ol>
      <div class="acoes">
        <a href="${MG_LINK_AUTH}" target="_blank" rel="noopener">Abrir essa tela no Supabase →</a>
        <button onclick="liberarTodosAcessos()">Copiar SQL que libera quem já foi criado</button>
        <button onclick="mgRechecarAuth()">Já ajustei, verificar</button>
      </div>
    </div>
    <button class="fechar" onclick="this.parentNode.remove()" title="Fechar">✕</button>
  </div>`;
}

async function mgRechecarAuth(){
  toast('Verificando…');
  await mgVerificarAuth();
  if(MG_AUTH && MG_AUTH.autoconfirma && MG_AUTH.cadastroLiberado){
    document.querySelectorAll('.mg-alerta-acesso').forEach(a=>{
      a.outerHTML = `<div class="mg-alerta ok"><span class="sinal">✓</span>
        <div class="txt"><b>Tudo certo.</b> Os acessos criados a partir de agora já entram na hora, sem confirmar nada.</div></div>`;
    });
    toast('Configuração correta ✓');
  }else{
    toast('Ainda está exigindo confirmação — confira se salvou no Supabase');
  }
}

/* ---- o aviso aparece onde o acesso é criado ---- */
const _mg13AbrirCli = abrirNovoCliente;
abrirNovoCliente = function(){
  _mg13AbrirCli();
  const corpo = document.querySelector('#mg-cli .mg-novocli');
  if(corpo && !corpo.querySelector('.mg-alerta-acesso')){
    const html = mgAlertaAcesso();
    if(html) corpo.insertAdjacentHTML('afterbegin', html);
  }
};
const _mg13AbrirEd = abrirEditarCliente;
abrirEditarCliente = function(id){
  _mg13AbrirEd(id);
  const sec = document.getElementById('mg-acessos');
  if(sec && !sec.querySelector('.mg-alerta-acesso')){
    const html = mgAlertaAcesso();
    if(html) sec.insertAdjacentHTML('afterbegin', html);
  }
};

/* ---- e também no Início, para o administrador ver logo de cara ---- */
const _mg13Home = renderHome;
renderHome = function(){
  const r = _mg13Home();
  if(VIEW!=='home' || !isAdmin()) return r;
  const el=$('v-home'); if(!el) return r;
  const html = mgAlertaAcesso();
  if(html && !el.querySelector('.mg-alerta-acesso')){
    const sub = el.querySelector('.mg-ola-sub');
    if(sub) sub.insertAdjacentHTML('afterend', html);
  }
  return r;
};

/* ---- se estiver tudo certo, a criação nem menciona confirmação ---- */
const _mg13Enriquecer = mgEnriquecerAviso;
mgEnriquecerAviso = function(idCaixa, email){
  if(MG_AUTH && MG_AUTH.autoconfirma) return;   /* não há o que liberar */
  return _mg13Enriquecer(idCaixa, email);
};

/* ---- verifica ao entrar ---- */
(function(){
  const _mg13Boot = boot;
  boot = async function(){
    const r = await _mg13Boot();
    if(isAdmin()){
      await mgVerificarAuth();
      if(VIEW==='home') renderHome();
    }
    return r;
  };
})();
</script>

<script>
/* =====================================================================
   ADIÇÃO 14
   1) Início ocupa a tela inteira, centralizado — sem barra lateral
   2) "Suas demandas de hoje" passa a reconhecer você de verdade
      (acento, sobrenome e nome vindo do e-mail)
   3) CORREÇÃO: as colunas do banco são due / priority / recurrence.
      O comando #adicionardemanda estava gravando prazo / prioridade,
      nomes que não existem — ou seja, ele falhava calado.
   ===================================================================== */

/* ---------- 1. reconhecer o usuário ---------- */
function mgNorm(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,' ').trim();
}
function mgMeusApelidos(){
  const set=new Set();
  if(ME){
    mgNorm(ME.name).split(' ').forEach(t=>{ if(t.length>=3) set.add(t) });
    if(ME.email) mgNorm(String(ME.email).split('@')[0]).split(' ').forEach(t=>{ if(t.length>=3) set.add(t) });
  }
  return [...set];
}
function mgSouEu(nome){
  const alvo = mgNorm(nome);
  if(!alvo) return false;
  const partes = alvo.split(' ');
  const meus = mgMeusApelidos();
  return meus.some(m => partes.some(p =>
    p===m || (p.length>=4 && m.length>=4 && (p.startsWith(m) || m.startsWith(p)))
  ));
}

/* ---------- 2. minhas demandas de hoje (campo correto: due) ---------- */
mgMinhasDeHoje = function(){
  if(!ME) return [];
  const hoje = todayISO();
  return (TASKS||[]).filter(t=>{
    if(DONE_STATUSES.includes(t.status) || clientStatus(t.status)==='Concluído') return false;
    if(!(t.assignees||[]).some(mgSouEu)) return false;
    if(t.status==='Entregas do dia') return true;      /* o app trata isso como "hoje" */
    return t.due && t.due<=hoje;
  }).sort((a,b)=>{
    const ad=a.due||'9999', bd=b.due||'9999';
    return ad.localeCompare(bd);
  });
};

/* ---------- 3. Início em tela cheia, centralizado ---------- */
const _mg14ShowView = showView;
showView = function(v){
  const r = _mg14ShowView(v);
  const emCasa = (VIEW==='home');
  document.body.classList.toggle('mg-inicio', emCasa);
  if(emCasa) document.body.classList.remove('mg-focado');
  return r;
};

/* envolve o conteúdo do Início numa coluna centralizada */
const _mg14Home = renderHome;
renderHome = function(){
  const r = _mg14Home();
  if(VIEW!=='home') return r;
  const el=$('v-home'); if(!el) return r;
  if(!el.querySelector('.mg-centro')){
    const dentro = el.innerHTML;
    el.innerHTML = `<div class="mg-centro">${dentro}</div>`;
  }
  return r;
};

/* ---------- 4. correção das colunas ao criar demanda pelo chat ---------- */
chCriarDemanda = async function(texto){
  const cur = CHANNELS.find(c=>c.id===CHAN);
  const campos={}; let inline='';
  texto.split(/\r?\n/).forEach(l=>{
    l=l.trim(); if(!l) return;
    const m = l.match(/^(t[íi]tulo|cliente|respons[áa]ve(?:l|is)|prazo|prioridade|descri[çc][ãa]o)\s*:\s*(.+)$/i);
    if(m){
      let k=m[1].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      k = k.startsWith('titulo')?'titulo' : k.startsWith('cliente')?'cliente'
        : k.startsWith('responsave')?'resp' : k.startsWith('prazo')?'prazo'
        : k.startsWith('priorid')?'prio' : 'desc';
      campos[k]=m[2].trim();
    } else if(/#adicionardemanda/i.test(l)){ inline = l.replace(/#adicionardemanda/i,'').trim() }
  });
  const titulo = campos.titulo || inline;
  if(!titulo){ toast('Informe ao menos um título na demanda'); return }

  let cid=null;
  if(campos.cliente){
    const f = CLIENTS.find(c=>mgNorm(c.nome).includes(mgNorm(campos.cliente)));
    if(f) cid=f.id;
  }
  if(!cid && cur && cur.tipo==='client') cid = cur.client_id;

  let who=[];
  if(campos.resp){
    campos.resp.split(/[,;\/]+/).map(s=>s.trim()).filter(Boolean).forEach(nm=>{
      const p = (ASSIGNEE_OPTS||[]).find(x=>mgNorm(x)===mgNorm(nm)) ||
                (ASSIGNEE_OPTS||[]).find(x=>mgNorm(x).startsWith(mgNorm(nm)));
      who.push(p||nm);
    });
  }
  let due=null;
  if(campos.prazo){
    const iso=campos.prazo.match(/^(\d{4})-(\d{2})-(\d{2})$/), br=campos.prazo.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(iso) due=campos.prazo; else if(br) due=`${br[3]}-${br[2]}-${br[1]}`;
  }
  let priority='Média';
  if(campos.prio){ const p=mgNorm(campos.prio); priority = p.startsWith('alt')?'Alta' : p.startsWith('baix')?'Baixa' : 'Média' }

  try{
    /* nomes de coluna exatamente como o app usa: due, priority, recurrence */
    const {error} = await sb.from('tasks').insert({
      title: titulo,
      client_id: cid,
      status: 'Não iniciado',
      priority: priority,
      due: due,
      recurrence: 'Nenhuma',
      assignees: who,
      description: campos.desc || ('Criada pelo chat em #'+(cur?cur.nome:'')+' por '+(ME?ME.name:'')+'.')
    });
    if(error) throw error;

    const resumo = [cid?('cliente: '+clientName(cid)):'', who.length?('resp.: '+who.join(', ')):'',
                    due?('prazo: '+fmtDate(due)):'', 'prioridade: '+priority].filter(Boolean).join(' · ');
    await sb.from('messages').insert({
      channel_id: CHAN, author_id: ME.id, author_name:'Tasks', kind:'system',
      body: `Demanda criada no Kanban: “${titulo}” — ${resumo}`
    });
    await loadMsgs(CHAN); renderChatView();
    if(typeof loadTasks==='function') await loadTasks();
    toast('Demanda criada no Kanban ✓');
  }catch(e){ toast('Não foi possível criar a demanda: '+((e&&e.message)||'erro')) }
};

    if(VIEW==='home'){ document.body.classList.add('mg-inicio'); renderHome(); }

const MG_TASKS_VIEWS = ['board','list','calendar'];

const MG_TASKS_ICONE  = {board:'▦', list:'☰', calendar:'▧'};
let MG_TASKS_SUB = 'board';

/* ---------- 1. um item só na barra ---------- */
(function(){
  const iPrimeiro = NAV.findIndex(n=>MG_TASKS_VIEWS.includes(n.v));
  for(let i=NAV.length-1;i>=0;i--){ if(MG_TASKS_VIEWS.includes(NAV[i].v)) NAV.splice(i,1) }
  if(!NAV.some(n=>n.v==='tasks')){
    NAV.splice(iPrimeiro<0?1:iPrimeiro, 0, {v:'tasks', ic:'▦', label:'Modesto Tasks'});
  }
  if($('nav') && $('nav').children.length) buildNav();
})();

/* ---------- 2. o seletor de visualização ---------- */
(function(){
  const cont=document.querySelector('.content');
  if(cont && !document.getElementById('mg-subnav')){
    const d=document.createElement('div');
    d.id='mg-subnav';
    cont.parentNode.insertBefore(d, cont);
  }
})();
function mgDesenhaSubnav(){
  const el=$('mg-subnav'); if(!el) return;
  el.innerHTML = `<div class="mg-seg">${
    MG_TASKS_VIEWS.map(v=>`<button class="${v===MG_TASKS_SUB?'on':''}" onclick="mgVerTasks('${v}')">
        <span class="ic">${MG_TASKS_ICONE[v]}</span>${MG_TASKS_ROTULO[v]}</button>`).join('')
  }</div>
  <span class="conta">${(TASKS||[]).length} demanda(s)</span>`;
}
function mgVerTasks(sub){
  MG_TASKS_SUB = MG_TASKS_VIEWS.includes(sub) ? sub : 'board';
  showView('tasks');
}

/* ---------- 3. navegação ---------- */
const _mg15ShowView = showView;
showView = function(v){
  /* pedir "tasks" abre a visualização escolhida por dentro */
  if(v==='tasks'){
    const r = _mg15ShowView(MG_TASKS_SUB);
    mgMarcarTasks();
    return r;
  }
  /* pedir board/list/calendar direto também conta como o módulo Tasks */
  if(MG_TASKS_VIEWS.includes(v)){
    MG_TASKS_SUB = v;
    const r = _mg15ShowView(v);
    mgMarcarTasks();
    return r;
  }
  const r = _mg15ShowView(v);
  document.body.classList.remove('mg-tasks');
  return r;
};
function mgMarcarTasks(){
  document.body.classList.add('mg-tasks');
  document.querySelectorAll('.nav-i').forEach(b=>b.classList.toggle('on', b.dataset.v==='tasks'));
  const t=$('view-title'); if(t) t.textContent='Modesto Tasks';
  mgDesenhaSubnav();
}

/* mantém o seletor em dia quando as demandas recarregam */
const _mg15Render = render;
render = function(){

};

<script>
/* =====================================================================
   ADIÇÃO 16
   O cliente tem uma empresa só — mostrar "categorias" e uma "pasta por
   cliente" com uma pasta dentro não ajuda ninguém. Ele passa a ver o
   nome da empresa em destaque e, logo abaixo, os documentos dele
   separados por tipo.
   ===================================================================== */
const _mg16Docs = renderDocsView;
renderDocsView = function(){
  /* admin e páginas internas seguem como estão */
  if(isAdmin() || !ME || !ME.client_id || DVIEW.kind!=='home') return _mg16Docs();

  const el = $('v-docs'); if(!el) return;

  if(!DOCS_LOADED){
    el.innerHTML = `<div class="mg-load">Carregando seus documentos…</div>`;
    loadDocs().then(renderDocsView);
    return;
  }

  const c = CLIENTS.find(x=>x.id===ME.client_id);
  const nome = c ? c.nome : 'Seus documentos';
  const meus = DOCS.filter(d=>d.client_id===ME.client_id);

  /* tipos presentes, na ordem definida, mais qualquer outro que apareça */
  const tipos = DOC_TIPOS.filter(t=>meus.some(d=>d.tipo===t.k));
  meus.forEach(d=>{ if(d.tipo && !tipos.some(t=>t.k===d.tipo)) tipos.push(docTipo(d.tipo)) });

  const marca = (c && c.logo_url)
    ? `<img src="${esc(c.logo_url)}" alt="">`
    : `<span class="ini" style="background:${c?clientColor(c.id):'var(--brass)'}">${esc((nome||'?')[0].toUpperCase())}</span>`;

  el.innerHTML = `
    <div class="mg-capa">
      <span class="marca">${marca}</span>
      <span class="txt">
        <h1>${esc(nome)}</h1>
        ${c && c.resumo ? `<div class="resumo">${esc(c.resumo)}</div>` : ''}
        <div class="conta">${meus.length} documento${meus.length===1?'':'s'} disponíve${meus.length===1?'l':'is'}</div>
      </span>
    </div>
    ${ meus.length
        ? tipos.map((t,i)=>{
            const lista = meus.filter(d=>d.tipo===t.k);
            return `<div class="mg-secao-cli" style="animation:mgSobe .42s cubic-bezier(.22,1,.36,1) ${(0.08+i*0.06).toFixed(2)}s both">
              <div class="mg-sec">
                <span class="sw" style="background:${t.hex}"></span>
                <span class="t">${esc(t.label)}</span>
                <span class="c">${lista.length}</span>
              </div>
              <div class="dgrid">${lista.map(docCardHTML).join('')}</div>
            </div>`;
          }).join('')
        : `<div class="mg-nada">Nenhum documento publicado ainda.<br>
             <span style="font-size:12.5px">Assim que a equipe publicar algo, aparece aqui.</span></div>`
    }`;
};

/* a página de um documento também volta para a capa do cliente */
const _mg16Voltar = voltarDocs;
voltarDocs = function(){
  if(!isAdmin() && ME && ME.client_id){
    DVIEW = {kind:'home'};
    renderDocsView();
    return;
  }
  return _mg16Voltar();
};

/* o caminho de navegação do cliente não precisa citar "Documentos › empresa" */
const _mg16DocPagina = renderDocsView;
renderDocsView = function(){
  const r = _mg16DocPagina();
  if(isAdmin() || !ME || !ME.client_id || DVIEW.kind!=='doc') return r;
  const el=$('v-docs'); if(!el) return r;
  const crumb = el.querySelector('.mg-crumb');
  if(crumb){
    const d = DOCS.find(x=>String(x.id)===String(DVIEW.id));
    crumb.innerHTML = `<a onclick="voltarDocs()">${esc(clientName(ME.client_id))}</a>
      <span>›</span><b style="color:var(--text)">${esc(d?d.titulo:'Documento')}</b>`;
  }
  const voltar = el.querySelector('.mg-voltar');
  if(voltar) voltar.innerHTML = `<span class="seta">←</span> Voltar para meus documentos`;
  return r;
};

   • Configurações em blocos que abrem e fecham
   • CORREÇÃO da foto de perfil (o app chamava uma função inexistente)
   • Som ao receber aviso
   ===================================================================== */

/* ---------------- 1. abrir sem baixar ---------------- */
abrirArquivoEmAba = async function(id){
  const d = DOCS.find(x=>String(x.id)===String(id)); if(!d) return;
  if(!d.storage_path && d.metadata && d.metadata.link){ window.open(d.metadata.link,'_blank','noopener'); return }
  if(!d.storage_path){ toast('Documento sem arquivo anexado'); return }
  toast('Abrindo…');
  try{
    const {data,error} = await sb.storage.from('documents').createSignedUrl(d.storage_path, 300);
    if(error) throw error;

    if(ehHTML(d.storage_path)){
      /* escreve o conteúdo direto na aba nova: renderiza como página,
         sem passar por download nenhum */
      const resp = await fetch(data.signedUrl);
      const txt  = await resp.text();
      const aba  = window.open('', '_blank');
      if(!aba){ toast('O navegador bloqueou a nova aba — libere os pop-ups'); return }
      aba.document.open();
      aba.document.write(txt);
      aba.document.close();
      try{ aba.document.title = d.titulo || 'Documento' }catch(_){}
      return;
    }
    /* PDF, imagem e afins: o próprio navegador exibe */
    window.open(data.signedUrl, '_blank');
  }catch(e){ toast('Não foi possível abrir: '+((e&&e.message)||'erro')) }
};

/* ---------------- 2. excluir documento ---------------- */
async function excluirDocumento(id){
  const d = DOCS.find(x=>String(x.id)===String(id)); if(!d) return;
  if(!confirm(`Excluir “${d.titulo}”?\n\nO arquivo sai da pasta e do armazenamento. Não dá para desfazer.`)) return;
  try{
    if(d.storage_path){
      try{ await sb.storage.from('documents').remove([d.storage_path]) }catch(_){}
    }
    const {error} = await sb.from('documents').delete().eq('id', d.id);
    if(error) throw error;
    DOCS = DOCS.filter(x=>String(x.id)!==String(d.id));
    DVIEW = {kind:'client', id:d.client_id};
    renderDocsView();
    toast('Documento excluído');
  }catch(e){ toast('Não foi possível excluir: '+((e&&e.message)||'erro')) }
}

/* ---------------- 3. voltar nas pastas e categorias ---------------- */
const _mg18Docs = renderDocsView;
renderDocsView = function(){
  const r = _mg18Docs();
  const el = $('v-docs'); if(!el) return r;

  /* botão de excluir na página do documento (só admin) */
  if(DVIEW.kind==='doc' && isAdmin()){
    const acoes = el.querySelector('.mg-doc-acoes');
    if(acoes && !acoes.querySelector('.mg-excluir')){
      acoes.insertAdjacentHTML('beforeend',
        `<button class="mini-btn ghost mg-excluir" style="color:var(--danger);border-color:rgba(184,74,62,.35)"
           onclick="excluirDocumento('${esc(String(DVIEW.id))}')">Excluir</button>`);
    }
  }
  /* voltar nas pastas de cliente e nas categorias */
  if((DVIEW.kind==='client' || DVIEW.kind==='cat') && !el.querySelector('.mg-voltar')){
    el.insertAdjacentHTML('afterbegin',
      `<button class="mg-voltar mg-voltar-topo" onclick="dGo({kind:'home'})" title="Voltar (Esc)">
         <span class="seta">←</span> Voltar para Documentos
       </button>`);
  }
  return r;
};
document.addEventListener('keydown', e=>{
  if(e.key!=='Escape') return;
  const janela = ['mg-cli','mg-cfg','mg-edcli'].some(id=>{ const m=$(id); return m && m.classList.contains('on') });
  if(janela) return;
  if(VIEW==='docs' && (DVIEW.kind==='client'||DVIEW.kind==='cat')) dGo({kind:'home'});
});

/* ---------------- 4. tamanho dos cards ---------------- */
const MG_CARDS_KEY='mgp_cards';
function mgAplicarCards(){
  const v = localStorage.getItem(MG_CARDS_KEY) || 'm';
  document.body.setAttribute('data-cards', v);
  return v;
}
function mgDefinirCards(v){
  localStorage.setItem(MG_CARDS_KEY, v);
  mgAplicarCards();
  document.querySelectorAll('[data-cards-op]').forEach(b=>
    b.classList.toggle('on', b.getAttribute('data-cards-op')===v));
  toast('Tamanho dos cards atualizado');
}
mgAplicarCards();

/* ---------------- 5. som de aviso ---------------- */
const MG_SOM_KEY='mgp_som';
function mgSomLigado(){ return localStorage.getItem(MG_SOM_KEY)!=='off' }
function mgTocarAviso(){
  if(!mgSomLigado()) return;
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = mgTocarAviso._ctx || (mgTocarAviso._ctx = new Ctx());
    if(ctx.state==='suspended') ctx.resume();
    const agora = ctx.currentTime;
    /* duas notas curtas, discretas */
    [[880,0],[1174.7,0.11]].forEach(([hz,atraso])=>{
      const osc = ctx.createOscillator(), vol = ctx.createGain();
      osc.type='sine'; osc.frequency.value=hz;
      vol.gain.setValueAtTime(0.0001, agora+atraso);
      vol.gain.exponentialRampToValueAtTime(0.14, agora+atraso+0.02);
      vol.gain.exponentialRampToValueAtTime(0.0001, agora+atraso+0.26);
      osc.connect(vol); vol.connect(ctx.destination);
      osc.start(agora+atraso); osc.stop(agora+atraso+0.3);
    });
  }catch(_){}
}
function mgAlternarSom(v){
  localStorage.setItem(MG_SOM_KEY, v);
  document.querySelectorAll('[data-som-op]').forEach(b=>
    b.classList.toggle('on', b.getAttribute('data-som-op')===v));
  if(v==='on'){ mgTocarAviso(); toast('Som dos avisos ligado') } else toast('Som dos avisos desligado');
}

/* toca quando o sino ganha aviso novo */
(function(){
  let antes = -1;
  if(typeof updateNotifBadge==='function'){
    const _mg18Badge = updateNotifBadge;
    updateNotifBadge = function(){
      const r = _mg18Badge();
      const n = (typeof NOTIFS!=='undefined' && NOTIFS) ? NOTIFS.length : 0;
      if(antes>=0 && n>antes) mgTocarAviso();
      antes = n;
      return r;
    };
  }
})();
/* e quando chega mensagem no chat */
(function(){
  if(typeof chSubscribe!=='function') return;
  const _mg18Sub = chSubscribe;
  chSubscribe = function(){
    const r = _mg18Sub();
    try{
      if(CH_SUB && CH_SUB.on){
        CH_SUB.on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, p=>{
          if(p && p.new && ME && p.new.author_id!==ME.id) mgTocarAviso();
        });
      }
    }catch(_){}
    return r;
  };
})();

/* ---------------- 6. CORREÇÃO da foto e do nome ----------------
   O app chamava sb.rpc('update_my_profile'), função que não existe
   neste banco — por isso a foto nunca salvava, sem dar erro visível.
   Agora grava direto em profiles.                                   */
pickAvatar = function(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    if(file.size > 6*1024*1024){ toast('Imagem muito grande (máx. 6 MB)'); return }
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=async()=>{
        const cv=document.createElement('canvas'); const S=192; cv.width=S; cv.height=S;
        const ctx=cv.getContext('2d'); const m=Math.min(img.width,img.height);
        ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,S,S);
        const dataUrl=cv.toDataURL('image/jpeg',0.82);
        try{
          const {error} = await sb.from('profiles').update({avatar_url:dataUrl}).eq('id', ME.id);
          if(error) throw error;
          ME.avatar_url = dataUrl;
          setMeAvatar();
          if(typeof mgAtualizarEu==='function') mgAtualizarEu();
          const alvo=document.querySelector('#mg-cfg-corpo .avatar-pick');
          if(alvo) alvo.innerHTML = avatarInner(ME.name, ME.avatar_url);
          toast('Foto atualizada ✓');
        }catch(err){
          const m2=(err&&err.message)||'';
          if(/row-level security|permission|policy/i.test(m2))
            toast('O banco não permitiu salvar sua foto — falta a permissão de editar o próprio perfil (veja a Parte 8 do SQL)');
          else toast('Não foi possível salvar a foto: '+(m2||'erro'));
          console.error(err);
        }
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  };
  inp.click();
};
saveMyName = async function(){
  const el=document.querySelector('#mg-cfg-corpo #set-name') || $('set-name');
  const nm=(el&&el.value||'').trim(); if(!nm) return;
  try{
    const {error} = await sb.from('profiles').update({nome:nm}).eq('id', ME.id);
    if(error) throw error;
    ME.name=nm;
    const n=$('me-nm'); if(n) n.textContent=nm;
    setMeAvatar();
    if(typeof mgAtualizarEu==='function') mgAtualizarEu();
    toast('Nome atualizado ✓');
  }catch(err){
    const m2=(err&&err.message)||'';
    if(/row-level security|permission|policy/i.test(m2))
      toast('O banco não permitiu salvar — falta a permissão de editar o próprio perfil (Parte 8 do SQL)');
    else toast('Não foi possível salvar: '+(m2||'erro'));
  }
};

/* ---------------- 7. configurações em blocos ---------------- */
const MG_BLOCOS = [
  {chave:'Aparência',      titulo:'Personalização', ic:'◐', ds:'Tema, cores, tamanho e densidade'},
  {chave:'Meu perfil',     titulo:'Meu perfil',     ic:'☺', ds:'Sua foto, nome e senha'},
  {chave:'Conta',          titulo:'Conta',          ic:'⚿', ds:'E-mail, papel e empresa'},
  {chave:'Notificações',   titulo:'Notificações',   ic:'🔔', ds:'Avisos e som'},
  {chave:'Sessão',         titulo:'Sessão',         ic:'⏻', ds:'Encerrar o acesso'},
];
const _mg18AbrirConfig = abrirConfig;
abrirConfig = function(){
  _mg18AbrirConfig();
  const corpo = $('mg-cfg-corpo'); if(!corpo) return;
  if(corpo.querySelector('.mg-bloco')) return;

  const secoes = [...corpo.querySelectorAll('.set-sec')];
  const novo = document.createElement('div');

  secoes.forEach((sec, i)=>{
    const h3 = sec.querySelector('h3');
    const nome = h3 ? h3.textContent.trim() : ('Seção '+(i+1));
    const def = MG_BLOCOS.find(b=>nome.indexOf(b.chave)===0) || {titulo:nome, ic:'•', ds:''};
    const bloco = document.createElement('div');
    bloco.className = 'mg-bloco';
    bloco.innerHTML = `
      <button class="cabeca" onclick="mgAlternarBloco(this)">
        <span class="ic">${def.ic}</span>
        <span class="tt"><b>${esc(def.titulo)}</b><span>${esc(def.ds)}</span></span>
        <span class="seta">▼</span>
      </button>
      <div class="corpo"></div>`;
    bloco.querySelector('.corpo').appendChild(sec);
    novo.appendChild(bloco);
  });

  /* extras: tamanho dos cards e som dos avisos */
  const atual = mgAplicarCards();
  const som = mgSomLigado() ? 'on' : 'off';
  const extra = document.createElement('div');
  extra.className='mg-bloco';
  extra.innerHTML = `
    <button class="cabeca" onclick="mgAlternarBloco(this)">
      <span class="ic">▣</span>
      <span class="tt"><b>Cards e avisos</b><span>Tamanho dos cards e som das notificações</span></span>
      <span class="seta">▼</span>
    </button>
    <div class="corpo">
      <div class="set-row" style="display:flex;align-items:center;gap:12px;padding:12px 0">
        <div class="k" style="flex:1">Tamanho dos cards<div style="font-size:11.5px;color:var(--muted)">Vale para documentos e pastas</div></div>
        <div class="seg-l" style="display:flex;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:4px">
          ${[['p','Pequeno'],['m','Médio'],['g','Grande']].map(([v,l])=>
            `<button data-cards-op="${v}" class="${v===atual?'on':''}" onclick="mgDefinirCards('${v}')"
               style="background:${v===atual?'var(--card)':'none'};border:0;border-radius:7px;padding:7px 13px;font-size:12.5px;font-weight:600;font-family:inherit;color:${v===atual?'var(--brass2)':'var(--muted)'}">${l}</button>`
          ).join('')}
        </div>
      </div>
      <div class="mg-som-linha">
        <div style="flex:1">Som ao receber aviso<div class="ds">Um toque curto quando chega demanda ou mensagem</div></div>
        <div style="display:flex;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:4px">
          ${[['on','Ligado'],['off','Desligado']].map(([v,l])=>
            `<button data-som-op="${v}" class="${v===som?'on':''}" onclick="mgAlternarSom('${v}')"
               style="background:${v===som?'var(--card)':'none'};border:0;border-radius:7px;padding:7px 13px;font-size:12.5px;font-weight:600;font-family:inherit;color:${v===som?'var(--brass2)':'var(--muted)'}">${l}</button>`
          ).join('')}
        </div>
      </div>
    </div>`;
  novo.appendChild(extra);

  corpo.innerHTML='';
  corpo.appendChild(novo);
  /* o primeiro bloco começa aberto */
  const primeiro = corpo.querySelector('.mg-bloco');
  if(primeiro) primeiro.classList.add('aberto');
};
function mgAlternarBloco(btn){
  const bloco = btn.closest('.mg-bloco');
  const abrindo = !bloco.classList.contains('aberto');
  bloco.parentNode.querySelectorAll('.mg-bloco').forEach(b=>b.classList.remove('aberto'));
  if(abrindo) bloco.classList.add('aberto');
}
</script>
